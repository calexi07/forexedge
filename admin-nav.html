<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Nav Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
<style>
.nav-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}

/* Nav tree */
.nav-tree{display:flex;flex-direction:column;gap:4px}
.nav-node{position:relative}
.nav-node-children{margin-left:28px;margin-top:4px;display:flex;flex-direction:column;gap:4px;border-left:2px solid var(--border2);padding-left:12px}
.nav-node-grandchildren{margin-left:28px;margin-top:4px;display:flex;flex-direction:column;gap:4px;border-left:2px dashed var(--border2);padding-left:12px}

/* Card per level */
.nic{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:4px;transition:all 0.15s;border:1px solid var(--border2)}
.nic.l0{background:var(--bg2);border-color:var(--border2)}
.nic.l1{background:var(--bg3);border-color:rgba(255,255,255,0.05);font-size:13px}
.nic.l2{background:rgba(8,9,12,0.6);border-color:rgba(255,255,255,0.03);font-size:12px}
.nic:hover{border-color:var(--gold-border)}
.nic.inactive{opacity:0.45}
.nic.drag-over{border-color:var(--gold);background:var(--gold-dim)}
.nic-drag{color:var(--white3);cursor:grab;font-size:15px;flex-shrink:0}
.nic-drag:active{cursor:grabbing}
.nic-label{flex:1;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nic-url{font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.nic-badge{font-family:'DM Mono',monospace;font-size:8px;padding:1px 6px;border-radius:100px;flex-shrink:0}
.nic-badge.vis{background:var(--bull-bg);color:var(--bull);border:1px solid rgba(76,175,125,0.2)}
.nic-badge.hid{background:rgba(255,255,255,0.04);color:var(--white3);border:1px solid var(--border2)}
.nic-badge.l1b{background:rgba(74,158,255,0.1);color:#6ba3ff;border:1px solid rgba(74,158,255,0.2)}
.nic-badge.l2b{background:rgba(168,85,247,0.1);color:#b87fff;border:1px solid rgba(168,85,247,0.2)}
.nic-actions{display:flex;gap:3px;flex-shrink:0}
.na{width:26px;height:26px;background:none;border:1px solid var(--border2);color:var(--white3);cursor:pointer;border-radius:3px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.na:hover{border-color:var(--gold-border);color:var(--gold)}
.na.del:hover{border-color:var(--bear);color:var(--bear)}
.add-child-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:transparent;border:1px dashed rgba(200,169,110,0.15);color:rgba(200,169,110,0.4);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;cursor:pointer;border-radius:3px;transition:all 0.15s;margin-top:4px;width:100%}
.add-child-btn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}

/* Preview nav */
.prev-nav{background:#08090c;border:1px solid rgba(255,255,255,0.08);border-radius:6px;overflow:hidden}
.prev-nav-bar{padding:12px 16px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:rgba(8,9,12,0.9);border-bottom:1px solid rgba(255,255,255,0.06)}
.prev-logo{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;margin-right:10px}
.prev-logo span{color:#c8a96e;font-style:italic}
.prev-item{position:relative}
.prev-link{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7a7570;padding:4px 8px;border-radius:3px;cursor:default;white-space:nowrap}
.prev-item:hover .prev-link{color:#c8c4bc}
.prev-dropdown{display:none;position:absolute;top:100%;left:0;background:#0c0e13;border:1px solid rgba(200,169,110,0.15);border-radius:4px;min-width:160px;z-index:10;padding:4px 0}
.prev-item:hover .prev-dropdown{display:block}
.prev-sub{padding:7px 12px;font-family:'Syne',sans-serif;font-size:10px;color:#a09880;cursor:default;white-space:nowrap;display:flex;align-items:center;justify-content:space-between;gap:8px}
.prev-sub:hover{background:rgba(200,169,110,0.08);color:#c8c4bc}
.prev-sub2{display:none;position:absolute;left:100%;top:0;background:#0c0e13;border:1px solid rgba(200,169,110,0.15);border-radius:4px;min-width:150px;padding:4px 0}
.prev-sub-wrap:hover .prev-sub2{display:block}
.prev-sub-wrap{position:relative}
.level-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--white2)}
.ll{display:flex;align-items:center;gap:5px}
.ll-dot{width:10px;height:10px;border-radius:2px}
</style>
</head>
<body class="et-loading">
<div id="et-loader">
  <div class="et-loader-logo"><div class="et-loader-eagle">🦅</div><div class="et-loader-name">Eagle<span>Pips</span></div></div>
  <div class="et-loader-bar"><div class="et-loader-bar-fill"></div></div>
  <div class="et-loader-text">Loading nav manager...</div>
</div>
<div id="etSidebarMount"></div>
<div class="hub-main">
  <div class="hub-topbar">
    <a href="admin.html" style="background:none;border:1px solid var(--border2);color:var(--white3);padding:5px 12px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">← Admin</a>
    <div class="hub-topbar-title" style="flex:1;margin-left:14px">🧭 <strong>Navigation Manager</strong></div>
    <span id="saveStatus" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3)"></span>
    <button class="et-btn-ghost" onclick="window.open('index.html','_blank')" style="padding:6px 12px;font-size:11px">↗ Live</button>
    <button class="et-btn-gold" onclick="saveNav()" style="padding:6px 14px;font-size:11px">💾 Save Nav</button>
  </div>
  <div class="hub-content" id="adminContent">
    <div style="text-align:center;padding:60px"><div class="et-spinner"></div></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="et-modal-overlay" id="nimModal">
  <div class="et-modal" style="max-width:420px">
    <button class="et-modal-close" onclick="etCloseModal('nimModal')">✕</button>
    <div class="et-modal-title" id="nimTitle">Add Item</div>
    <input type="hidden" id="nimId">
    <input type="hidden" id="nimParentId">
    <input type="hidden" id="nimLevel">
    <div style="padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;margin-bottom:14px;display:none" id="nimParentInfo">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">Parent item</div>
      <div style="font-size:13px;font-weight:500;color:var(--white)" id="nimParentName">—</div>
    </div>
    <div class="et-form-group"><label class="et-form-label">Label *</label><input type="text" class="et-form-input" id="nimLabel" placeholder="e.g. Market Updates" oninput="nimPrev()"></div>
    <div class="et-form-group"><label class="et-form-label">URL *</label><input type="text" class="et-form-input" id="nimUrl" placeholder="e.g. market-updates.html"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;margin-bottom:14px">
      <div><div style="font-size:13px;font-weight:500;color:var(--white)">Open in new tab</div><div style="font-size:11px;color:var(--white3)">For external links</div></div>
      <input type="checkbox" id="nimNewTab" style="width:18px;height:18px;accent-color:var(--gold);cursor:pointer">
    </div>
    <div id="nimPrevWrap" style="padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;margin-bottom:14px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Preview</div>
      <span id="nimPrevEl" style="font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#c8c4bc;padding:4px 10px;background:rgba(255,255,255,0.06);border-radius:3px"></span>
    </div>
    <button class="et-form-submit" onclick="saveItem()">Save →</button>
  </div>
</div>

<script>
let _user,_sb,navItems=[],dragSrc=null;

async function main(){
  const res=await initEtSidebar('admin');
  if(!res)return;
  _user=res.user;_sb=res.sb;
  if(!_user.user_metadata?.is_admin){document.getElementById('adminContent').innerHTML='<div style="text-align:center;padding:60px;color:var(--white3)">Access denied.</div>';return;}
  await loadNav();
  renderPage();
}

async function loadNav(){
  const{data}=await _sb.from('nav_items').select('*').order('sort_order',{ascending:true});
  navItems=(data||[]).map(n=>({...n,level:n.level||0}));
}

// Build tree structure
function buildTree(){
  const roots=navItems.filter(n=>!n.parent_id).sort((a,b)=>a.sort_order-b.sort_order);
  return roots.map(r=>({
    ...r,
    children:navItems.filter(n=>n.parent_id===r.id).sort((a,b)=>a.sort_order-b.sort_order).map(c=>({
      ...c,
      children:navItems.filter(n=>n.parent_id===c.id).sort((a,b)=>a.sort_order-b.sort_order)
    }))
  }));
}

function renderPage(){
  document.getElementById('adminContent').innerHTML=`
    <div class="nav-layout">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--white);margin-bottom:3px">Menu Structure</div>
            <div class="level-legend">
              <div class="ll"><div class="ll-dot" style="background:var(--bg2);border:1px solid var(--border2)"></div>Level 0 — Main</div>
              <div class="ll"><div class="ll-dot" style="background:var(--bg3);border:1px solid rgba(74,158,255,0.3)"></div>Level 1 — Sub</div>
              <div class="ll"><div class="ll-dot" style="background:#08090c;border:1px dashed rgba(168,85,247,0.3)"></div>Level 2 — Deep</div>
            </div>
          </div>
          <button class="et-btn-gold" onclick="openAdd(null,0)" style="padding:6px 14px;font-size:11px">+ Add Item</button>
        </div>
        <div class="nav-tree" id="navTree"></div>
      </div>
      <div style="position:sticky;top:74px">
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px">Live Preview — hover to see submenus</div>
        <div class="prev-nav">
          <div class="prev-nav-bar" id="navPreview"></div>
          <div style="padding:10px 14px;font-size:11px;color:var(--white3);line-height:1.7">
            Hover menu items to see dropdowns.<br>
            Changes visible after Save.
          </div>
        </div>
        <div style="margin-top:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;font-size:12px;color:var(--white2);line-height:1.8">
          <strong style="color:var(--white)">Tips:</strong><br>
          • Drag ⠿ to reorder items<br>
          • Click + Sub to add a submenu item<br>
          • Max 3 levels supported<br>
          • External links: use full https://...
        </div>
      </div>
    </div>`;
  renderTree();
  renderPreview();
}

function renderTree(){
  const tree=buildTree();
  const el=document.getElementById('navTree');
  if(!tree.length){
    el.innerHTML='<div style="text-align:center;padding:32px;border:1px dashed rgba(200,169,110,0.15);border-radius:4px;color:var(--white3);font-size:13px">No items yet. Click "+ Add Item".</div>';
    return;
  }
  el.innerHTML=tree.map(node=>renderNode(node,0)).join('');
}

function renderNode(node,level){
  const levelClass=['l0','l1','l2'][level]||'l2';
  const badgeClass=level===0?'vis':'l1b';
  const canAddChild=level<2;

  let html=`<div class="nav-node" id="node-${node.id}">
    <div class="nic ${levelClass} ${node.active?'':'inactive'}"
      draggable="true"
      ondragstart="dragStart(event,'${node.id}')"
      ondragover="dragOver(event,'${node.id}')"
      ondragleave="dragLeave(event,'${node.id}')"
      ondrop="drop(event,'${node.id}')">
      <span class="nic-drag">⠿</span>
      ${level>0?`<span style="font-size:10px;color:var(--white3);flex-shrink:0">${level===1?'└─':'  └─'}</span>`:''}
      <div style="flex:1;min-width:0">
        <div class="nic-label">${node.label}</div>
        <div class="nic-url">${node.url}${node.open_new_tab?' ↗':''}</div>
      </div>
      <span class="nic-badge ${node.active?(level===0?'vis':level===1?'l1b':'l2b'):'hid'}">${node.active?'Visible':'Hidden'}</span>
      ${node.children?.length?`<span style="font-family:'DM Mono',monospace;font-size:8px;padding:1px 6px;background:rgba(255,255,255,0.06);border:1px solid var(--border2);color:var(--white3);border-radius:100px">${node.children.length} sub</span>`:''}
      <div class="nic-actions">
        <button class="na" onclick="toggleActive('${node.id}')" title="${node.active?'Hide':'Show'}">${node.active?'👁':'🚫'}</button>
        <button class="na" onclick="openEdit('${node.id}')" title="Edit">✏️</button>
        ${canAddChild?`<button class="na" onclick="openAdd('${node.id}',${level+1})" title="Add submenu item" style="font-size:9px;font-family:'DM Mono',monospace;width:auto;padding:0 6px">+Sub</button>`:''}
        <button class="na del" onclick="deleteItem('${node.id}')" title="Delete">🗑</button>
      </div>
    </div>`;

  if(node.children?.length){
    const childClass=level===0?'nav-node-children':'nav-node-grandchildren';
    html+=`<div class="${childClass}">${node.children.map(c=>renderNode(c,level+1)).join('')}</div>`;
  }

  html+='</div>';
  return html;
}

function renderPreview(){
  const el=document.getElementById('navPreview');
  if(!el)return;
  const tree=buildTree();
  const active=tree.filter(n=>n.active);

  el.innerHTML=`
    <span class="prev-logo">Eagle<span>Pips</span></span>
    ${active.map(n=>{
      const activeSubs=n.children?.filter(c=>c.active)||[];
      if(!activeSubs.length) return `<div class="prev-item"><span class="prev-link">${n.label}</span></div>`;
      return`<div class="prev-item">
        <span class="prev-link">${n.label} ▾</span>
        <div class="prev-dropdown">
          ${activeSubs.map(sub=>{
            const activeSub2=sub.children?.filter(c=>c.active)||[];
            if(!activeSub2.length) return`<div class="prev-sub">${sub.label}</div>`;
            return`<div class="prev-sub-wrap">
              <div class="prev-sub">${sub.label} <span style="font-size:9px;opacity:0.5">▸</span></div>
              <div class="prev-sub2">${activeSub2.map(s2=>`<div class="prev-sub">${s2.label}</div>`).join('')}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    <span style="margin-left:auto;display:flex;gap:5px;align-items:center">
      <span style="padding:4px 9px;border:1px solid rgba(255,255,255,0.1);border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;color:#7a7570">Sign In</span>
      <span style="padding:4px 9px;background:#c8a96e;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;color:#08090c;font-weight:700">Get Access</span>
    </span>`;
}

// Drag & drop (within same level only for simplicity)
function dragStart(e,id){dragSrc=id;e.dataTransfer.effectAllowed='move';}
function dragOver(e,id){e.preventDefault();if(id!==dragSrc)document.getElementById('node-'+id)?.querySelector('.nic')?.classList.add('drag-over');}
function dragLeave(e,id){document.getElementById('node-'+id)?.querySelector('.nic')?.classList.remove('drag-over');}
function drop(e,id){
  e.preventDefault();
  document.querySelectorAll('.nic').forEach(c=>c.classList.remove('drag-over'));
  if(!dragSrc||dragSrc===id)return;
  const srcItem=navItems.find(n=>n.id===dragSrc);
  const tgtItem=navItems.find(n=>n.id===id);
  if(!srcItem||!tgtItem)return;
  // Only reorder items at same level/parent
  if(srcItem.parent_id!==tgtItem.parent_id)return;
  const siblings=navItems.filter(n=>n.parent_id===srcItem.parent_id).sort((a,b)=>a.sort_order-b.sort_order);
  const si=siblings.findIndex(n=>n.id===dragSrc);
  const ti=siblings.findIndex(n=>n.id===id);
  const[moved]=siblings.splice(si,1);
  siblings.splice(ti,0,moved);
  siblings.forEach((n,i)=>{const item=navItems.find(x=>x.id===n.id);if(item)item.sort_order=i+1;});
  renderTree();renderPreview();dragSrc=null;
}

// CRUD
function openAdd(parentId,level){
  document.getElementById('nimId').value='';
  document.getElementById('nimParentId').value=parentId||'';
  document.getElementById('nimLevel').value=level||0;
  document.getElementById('nimLabel').value='';
  document.getElementById('nimUrl').value='';
  document.getElementById('nimNewTab').checked=false;
  document.getElementById('nimTitle').textContent=level===0?'Add Menu Item':level===1?'Add Submenu Item':'Add Deep Item';
  const pi=document.getElementById('nimParentInfo');
  if(parentId){
    const parent=navItems.find(n=>n.id===parentId);
    pi.style.display='block';
    document.getElementById('nimParentName').textContent=parent?.label||'—';
  } else {pi.style.display='none';}
  nimPrev();
  etOpenModal('nimModal');
}

function openEdit(id){
  const item=navItems.find(n=>n.id===id);if(!item)return;
  document.getElementById('nimId').value=item.id;
  document.getElementById('nimParentId').value=item.parent_id||'';
  document.getElementById('nimLevel').value=item.level||0;
  document.getElementById('nimLabel').value=item.label;
  document.getElementById('nimUrl').value=item.url;
  document.getElementById('nimNewTab').checked=item.open_new_tab||false;
  document.getElementById('nimTitle').textContent='Edit Item';
  const pi=document.getElementById('nimParentInfo');
  if(item.parent_id){
    const parent=navItems.find(n=>n.id===item.parent_id);
    pi.style.display='block';
    document.getElementById('nimParentName').textContent=parent?.label||'—';
  } else {pi.style.display='none';}
  nimPrev();
  etOpenModal('nimModal');
}

function nimPrev(){document.getElementById('nimPrevEl').textContent=document.getElementById('nimLabel')?.value||'Label';}

function saveItem(){
  const id=document.getElementById('nimId').value;
  const label=document.getElementById('nimLabel').value.trim();
  const url=document.getElementById('nimUrl').value.trim();
  const parentId=document.getElementById('nimParentId').value||null;
  const level=parseInt(document.getElementById('nimLevel').value)||0;
  if(!label||!url){alert('Label and URL are required.');return;}

  if(id){
    const idx=navItems.findIndex(n=>n.id===id);
    if(idx>=0)navItems[idx]={...navItems[idx],label,url,open_new_tab:document.getElementById('nimNewTab').checked};
  } else {
    // Find max sort_order among siblings
    const siblings=navItems.filter(n=>n.parent_id===parentId);
    const maxOrder=siblings.length?Math.max(...siblings.map(n=>n.sort_order||0)):0;
    navItems.push({
      id:'new-'+Date.now(),label,url,
      parent_id:parentId,level,
      open_new_tab:document.getElementById('nimNewTab').checked,
      active:true,sort_order:maxOrder+1,_isNew:true
    });
  }
  etCloseModal('nimModal');
  renderTree();renderPreview();
}

function toggleActive(id){
  const item=navItems.find(n=>n.id===id);
  if(item)item.active=!item.active;
  renderTree();renderPreview();
}

function deleteItem(id){
  if(!confirm('Delete this item and all its sub-items?'))return;
  // Remove item and all children/grandchildren
  const toRemove=new Set([id]);
  navItems.filter(n=>n.parent_id===id).forEach(c=>{
    toRemove.add(c.id);
    navItems.filter(n=>n.parent_id===c.id).forEach(g=>toRemove.add(g.id));
  });
  navItems=navItems.filter(n=>!toRemove.has(n.id));
  renderTree();renderPreview();
}

async function saveNav(){
  setSaveStatus('Saving...');
  // Get existing DB ids
  const{data:existing}=await _sb.from('nav_items').select('id');
  const existingIds=new Set((existing||[]).map(n=>n.id));
  const currentIds=new Set(navItems.filter(n=>!n._isNew&&!n.id?.startsWith('new-')).map(n=>n.id));

  // Delete removed
  for(const dbId of existingIds){
    if(!currentIds.has(dbId)){
      await _sb.from('nav_items').delete().eq('id',dbId);
    }
  }

  // Upsert all — process in order (parents before children)
  const toProcess=[...navItems].sort((a,b)=>(a.level||0)-(b.level||0));
  for(let i=0;i<toProcess.length;i++){
    const item=toProcess[i];
    const payload={
      label:item.label,url:item.url,
      sort_order:item.sort_order||i+1,
      active:item.active,
      open_new_tab:item.open_new_tab||false,
      level:item.level||0,
      parent_id:item.parent_id||null
    };
    if(item._isNew||item.id?.startsWith('new-')){
      const oldId=item.id;
      const{data,error}=await _sb.from('nav_items').insert(payload).select().single();
      if(!error&&data){
        // Update references to this new id
        const realId=data.id;
        navItems.forEach(n=>{if(n.parent_id===oldId)n.parent_id=realId;});
        const idx=navItems.findIndex(n=>n.id===oldId);
        if(idx>=0)navItems[idx]={...navItems[idx],...data,_isNew:false};
      }
    } else {
      await _sb.from('nav_items').update(payload).eq('id',item.id);
    }
  }

  setSaveStatus('✓ Saved');
  await loadNav();
  renderTree();renderPreview();
}

function setSaveStatus(m){const el=document.getElementById('saveStatus');if(el)el.textContent=m;}
document.addEventListener('click',e=>{if(e.target.classList.contains('et-modal-overlay'))etCloseModal(e.target.id);});
</script>
