<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
<style>
.pages-layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
.page-list{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;position:sticky;top:74px;max-height:calc(100vh-100px);display:flex;flex-direction:column}
.pl-hdr{padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);flex-shrink:0}
.pl-body{overflow-y:auto;flex:1}
.pl-item{padding:11px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.15s}
.pl-item:last-child{border-bottom:none}
.pl-item:hover{background:var(--gold-dim)}
.pl-item.active{background:var(--gold-dim);border-left:2px solid var(--gold)}
.pl-title{font-size:12px;font-weight:500;color:var(--white);margin-bottom:3px}
.pl-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);display:flex;gap:8px;align-items:center}
.spill{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase}
.spill.live{background:var(--bull-bg);color:var(--bull);border:1px solid rgba(76,175,125,0.2)}
.spill.draft{background:rgba(255,255,255,0.04);color:var(--white3);border:1px solid var(--border2)}
/* Editor */
.page-editor{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.pe-tabs{display:flex;border-bottom:1px solid var(--border2);background:var(--bg3)}
.pe-tab{padding:10px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--white3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.pe-tab:hover{color:var(--white2)}
.pe-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.pe-panel{padding:20px;display:none}
.pe-panel.active{display:flex;flex-direction:column;gap:14px}
/* Template cards */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.tpl-card{padding:16px;background:var(--bg3);border:2px solid var(--border2);border-radius:4px;cursor:pointer;transition:all 0.15s;text-align:center}
.tpl-card:hover{border-color:var(--gold-border);background:var(--gold-dim)}
.tpl-card.selected{border-color:var(--gold);background:var(--gold-dim)}
.tpl-icon{font-size:28px;margin-bottom:8px}
.tpl-name{font-size:12px;font-weight:600;color:var(--white);margin-bottom:3px}
.tpl-desc{font-size:10px;color:var(--white3);line-height:1.4}
/* Sections editor */
.section-card{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:10px}
.sc-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.2);cursor:pointer}
.sc-hdr:hover{background:var(--gold-dim)}
.sc-drag{color:var(--white3);cursor:grab;font-size:14px}
.sc-title{font-size:12px;font-weight:600;color:var(--white);flex:1}
.sc-type{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);border-radius:100px}
.sc-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.sc-body.collapsed{display:none}
.add-section-row{display:flex;gap:6px;flex-wrap:wrap}
.add-sec-btn{padding:6px 12px;background:transparent;border:1px dashed rgba(200,169,110,0.2);color:rgba(200,169,110,0.5);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.add-sec-btn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}
/* Export */
.export-box{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:16px}
.export-preview{font-family:'DM Mono',monospace;font-size:11px;color:var(--white2);background:var(--bg);border:1px solid var(--border2);border-radius:3px;padding:14px;max-height:300px;overflow-y:auto;white-space:pre;line-height:1.6;margin-top:10px}
</style>
</head>
<body class="et-loading">
<div id="et-loader">
  <div class="et-loader-logo"><div class="et-loader-eagle">🦅</div><div class="et-loader-name">Eagle<span>Pips</span></div></div>
  <div class="et-loader-bar"><div class="et-loader-bar-fill"></div></div>
  <div class="et-loader-text">Loading pages...</div>
</div>
<div id="etSidebarMount"></div>
<div class="hub-main">
  <div class="hub-topbar">
    <a href="admin.html" style="background:none;border:1px solid var(--border2);color:var(--white3);padding:5px 12px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">← Admin</a>
    <div class="hub-topbar-title" style="flex:1;margin-left:14px">📄 <strong>Pages</strong></div>
    <span id="saveStatus" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3)"></span>
    <button class="et-btn-ghost" onclick="savePage(false)" style="padding:6px 12px;font-size:11px">💾 Save Draft</button>
    <button class="et-btn-gold" onclick="savePage(true)" style="padding:6px 14px;font-size:11px">🚀 Publish</button>
  </div>
  <div class="hub-content" id="adminContent">
    <div style="text-align:center;padding:60px"><div class="et-spinner"></div></div>
  </div>
</div>

<script>
let _user,_sb,pages=[],editingId=null,sections=[],activeTab='settings';

const TEMPLATES = {
  simple:  { name:'Simple',   icon:'📄', desc:'Title + text content' },
  hero:    { name:'Hero',     icon:'🦅', desc:'Big hero + sections' },
  pricing: { name:'Pricing',  icon:'💎', desc:'Pricing tiers table' },
  contact: { name:'Contact',  icon:'📬', desc:'Contact form + info' },
  custom:  { name:'Custom',   icon:'⚡', desc:'Build section by section' },
};

const SECTION_TYPES = {
  hero:      { label:'Hero',       icon:'🦅', fields:['title','subtitle','cta_text','cta_url','bg_image'] },
  text:      { label:'Text Block', icon:'📝', fields:['title','content'] },
  features:  { label:'Features',   icon:'✨', fields:['title','subtitle','items'] },
  pricing:   { label:'Pricing',    icon:'💎', fields:['title','subtitle','tiers'] },
  cta:       { label:'CTA Banner', icon:'📣', fields:['title','subtitle','btn_text','btn_url'] },
  faq:       { label:'FAQ',        icon:'❓', fields:['title','items'] },
  contact:   { label:'Contact',    icon:'📬', fields:['title','subtitle','email','phone','address'] },
  image:     { label:'Image',      icon:'🖼', fields:['image_url','caption','full_width'] },
  divider:   { label:'Divider',    icon:'—',  fields:[] },
};

async function main(){
  const res=await initEtSidebar('admin');
  if(!res)return;
  _user=res.user;_sb=res.sb;
  if(!_user.user_metadata?.is_admin){document.getElementById('adminContent').innerHTML='<div style="text-align:center;padding:60px;color:var(--white3)">Access denied.</div>';return;}
  renderLayout();
  await loadPages();
}

function renderLayout(){
  document.getElementById('adminContent').innerHTML=`
    <div class="pages-layout">
      <div>
        <div class="page-list">
          <div class="pl-hdr">
            <span style="font-size:12px;font-weight:600;color:var(--white)">Pages</span>
            <button class="et-btn-gold" onclick="newPage()" style="padding:4px 10px;font-size:10px">+ New</button>
          </div>
          <div class="pl-body" id="pageList"><div style="padding:20px;text-align:center"><div class="et-spinner"></div></div></div>
        </div>
      </div>
      <div>
        <div class="page-editor" id="pageEditor">
          <div style="text-align:center;padding:40px;color:var(--white3);font-size:13px">
            <div style="font-size:32px;opacity:0.15;margin-bottom:12px">📄</div>
            Select a page or create a new one
          </div>
        </div>
      </div>
    </div>`;
}

async function loadPages(){
  const{data}=await _sb.from('pages').select('*').order('created_at',{ascending:false});
  pages=data||[];
  renderList();
}

function renderList(){
  const el=document.getElementById('pageList');
  if(!pages.length){el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--white3)">No pages yet.</div>';return;}
  el.innerHTML=pages.map(p=>`
    <div class="pl-item ${editingId===p.id?'active':''}" onclick="loadPage('${p.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px">
        <div class="pl-title">${p.title}</div>
        <span class="spill ${p.published?'live':'draft'}">${p.published?'Live':'Draft'}</span>
      </div>
      <div class="pl-meta">
        <span>${TEMPLATES[p.template]?.icon||'📄'} ${p.template}</span>
        <span>/${p.slug}</span>
      </div>
      <div style="margin-top:5px;display:flex;gap:8px">
        ${p.published?`<a href="page.html?slug=${p.slug}" target="_blank" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);text-decoration:none">↗ View</a>`:''}
        <button onclick="event.stopPropagation();delPage('${p.id}')" style="background:none;border:none;color:var(--white3);cursor:pointer;font-size:9px;padding:0;font-family:'DM Mono',monospace;transition:color 0.15s" onmouseover="this.style.color='var(--bear)'" onmouseout="this.style.color='var(--white3)'">🗑 Delete</button>
      </div>
    </div>`).join('');
}

function newPage(){
  editingId=null;sections=[];
  renderEditor({title:'',slug:'',template:'simple',meta_description:'',published:false,sections:[]});
  renderList();
}

function loadPage(id){
  const p=pages.find(x=>x.id===id);if(!p)return;
  editingId=id;
  sections=Array.isArray(p.sections)?p.sections:[];
  renderEditor(p);
  renderList();
}

function renderEditor(p){
  const tpl=p.template||'simple';
  document.getElementById('pageEditor').innerHTML=`
    <div class="pe-tabs">
      <div class="pe-tab ${activeTab==='settings'?'active':''}" onclick="switchTab('settings')">⚙ Settings</div>
      <div class="pe-tab ${activeTab==='content'?'active':''}" onclick="switchTab('content')">✏️ Content</div>
      <div class="pe-tab ${activeTab==='export'?'active':''}" onclick="switchTab('export')">⬇ Export HTML</div>
    </div>

    <!-- Settings tab -->
    <div class="pe-panel ${activeTab==='settings'?'active':''}" id="tab-settings">
      <div><label class="et-form-label">Page Title *</label><input type="text" class="et-form-input" id="pTitle" value="${esc(p.title)}" oninput="autoSlug()"></div>
      <div><label class="et-form-label">Slug (URL) * — page will be at /${esc(p.slug)}.html</label><input type="text" class="et-form-input" id="pSlug" value="${esc(p.slug)}" placeholder="about"></div>
      <div><label class="et-form-label">Meta Description (SEO)</label><input type="text" class="et-form-input" id="pMeta" value="${esc(p.meta_description||'')}" placeholder="Brief description for search engines..."></div>
      <div>
        <label class="et-form-label">Template</label>
        <div class="tpl-grid" id="tplGrid">
          ${Object.entries(TEMPLATES).map(([key,t])=>`
            <div class="tpl-card ${tpl===key?'selected':''}" onclick="selectTemplate('${key}')">
              <div class="tpl-icon">${t.icon}</div>
              <div class="tpl-name">${t.name}</div>
              <div class="tpl-desc">${t.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Content tab -->
    <div class="pe-panel ${activeTab==='content'?'active':''}" id="tab-content">
      <div id="sectionsEditor"></div>
      <div class="add-section-row" id="addSectionRow">
        ${Object.entries(SECTION_TYPES).map(([key,t])=>`
          <button class="add-sec-btn" onclick="addSection('${key}')"><span>${t.icon}</span>${t.label}</button>`).join('')}
      </div>
    </div>

    <!-- Export tab -->
    <div class="pe-panel ${activeTab==='export'?'active':''}" id="tab-export">
      <div class="export-box">
        <div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:6px">Download HTML File</div>
        <div style="font-size:13px;color:var(--white2);line-height:1.7;margin-bottom:14px">
          Generate the HTML file for this page. Upload it to your GitHub repo and it will be live at <code style="font-family:'DM Mono',monospace;font-size:12px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:2px;color:var(--gold)">${esc(p.slug)||'slug'}.html</code>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="et-btn-gold" onclick="downloadHTML()" style="padding:9px 20px">⬇ Download ${esc(p.slug)||'page'}.html</button>
          <button class="et-btn-ghost" onclick="previewHTML()" style="padding:9px 16px">👁 Preview</button>
        </div>
        <div id="htmlPreview" style="display:none;margin-top:14px">
          <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Generated HTML</div>
          <pre class="export-preview" id="htmlCode"></pre>
        </div>
      </div>
      <div style="padding:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;font-size:12px;color:var(--white2);line-height:1.8">
        <strong style="color:var(--white)">How to publish:</strong><br>
        1. Save the page (Draft or Publish)<br>
        2. Click "Download .html"<br>
        3. Add the file to your GitHub repo<br>
        4. Vercel deploys automatically in ~15 seconds<br>
        5. Add to navigation via <a href="admin-nav.html" style="color:var(--gold)">Nav Manager</a>
      </div>
    </div>`;

  renderSectionsEditor();
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.pe-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pe-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.pe-tab:nth-child(${tab==='settings'?1:tab==='content'?2:3})`).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function selectTemplate(key){
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Auto-add default sections for template
  if(!sections.length){
    const defaults={
      simple:[{type:'text',title:'Content',data:{title:'',content:''}}],
      hero:[{type:'hero',title:'Hero',data:{title:'',subtitle:'',cta_text:'Get Started',cta_url:'auth.html'}},{type:'text',title:'About',data:{title:'About Us',content:''}}],
      pricing:[{type:'hero',title:'Hero',data:{title:'Simple, transparent pricing',subtitle:''}},{type:'pricing',title:'Pricing Tiers',data:{title:'',tiers:[]}}],
      contact:[{type:'contact',title:'Contact',data:{title:'Get in touch',subtitle:'',email:'',phone:'',address:''}},{type:'text',title:'Additional Info',data:{title:'',content:''}}],
      custom:[],
    };
    sections=defaults[key]||[];
    renderSectionsEditor();
  }
}

function autoSlug(){
  if(editingId)return;
  document.getElementById('pSlug').value=document.getElementById('pTitle').value.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,60);
}

// Sections editor
function renderSectionsEditor(){
  const el=document.getElementById('sectionsEditor');
  if(!el)return;
  if(!sections.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--white3);font-size:13px;margin-bottom:10px">No sections yet. Add one below.</div>';return;}
  el.innerHTML=sections.map((s,i)=>renderSectionCard(s,i)).join('');
}

function renderSectionCard(s,i){
  const st=SECTION_TYPES[s.type]||{label:s.type,icon:'📦'};
  const d=s.data||{};
  let fields='';

  switch(s.type){
    case'hero':
      fields=`
        <div><label class="et-form-label">Headline</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Page headline"></div>
        <div><label class="et-form-label">Subtitle</label><textarea class="et-form-input" rows="2" style="resize:none" oninput="updateSection(${i},'subtitle',this.value)" placeholder="Supporting text">${esc(d.subtitle||'')}</textarea></div>
        <div class="et-form-grid2">
          <div><label class="et-form-label">CTA Button Text</label><input type="text" class="et-form-input" value="${esc(d.cta_text||'')}" oninput="updateSection(${i},'cta_text',this.value)" placeholder="Get Started"></div>
          <div><label class="et-form-label">CTA URL</label><input type="text" class="et-form-input" value="${esc(d.cta_url||'')}" oninput="updateSection(${i},'cta_url',this.value)" placeholder="auth.html"></div>
        </div>
        <div><label class="et-form-label">Background Image URL (optional)</label><input type="url" class="et-form-input" value="${esc(d.bg_image||'')}" oninput="updateSection(${i},'bg_image',this.value)" placeholder="https://..."></div>`;
      break;
    case'text':
      fields=`
        <div><label class="et-form-label">Section Title</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Optional title"></div>
        <div><label class="et-form-label">Content (Markdown supported)</label><textarea class="et-form-input" rows="8" style="resize:vertical;font-family:'DM Mono',monospace;font-size:13px" oninput="updateSection(${i},'content',this.value)" placeholder="Write your content here...&#10;&#10;**Bold text**, *italic*, ## Heading, - list item">${esc(d.content||'')}</textarea></div>`;
      break;
    case'features':
      fields=`
        <div><label class="et-form-label">Section Title</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Why EaglePips?"></div>
        <div><label class="et-form-label">Subtitle</label><input type="text" class="et-form-input" value="${esc(d.subtitle||'')}" oninput="updateSection(${i},'subtitle',this.value)"></div>
        <div>
          <label class="et-form-label">Feature Items (one per line: icon | title | description)</label>
          <textarea class="et-form-input" rows="6" style="resize:vertical;font-family:'DM Mono',monospace;font-size:12px" oninput="updateSection(${i},'items_raw',this.value)" placeholder="📊 | Trading Journal | Track every trade automatically&#10;🤖 | AI Analysis | Get AI-powered insights&#10;📰 | News Sentiment | Real-time market news">${esc(d.items_raw||'')}</textarea>
          <div style="font-size:11px;color:var(--white3);margin-top:4px">Format: emoji | Title | Description</div>
        </div>`;
      break;
    case'pricing':
      fields=`
        <div><label class="et-form-label">Section Title</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Choose your plan"></div>
        <div>
          <label class="et-form-label">Pricing Tiers (JSON format)</label>
          <textarea class="et-form-input" rows="10" style="resize:vertical;font-family:'DM Mono',monospace;font-size:12px;line-height:1.6" oninput="updateSection(${i},'tiers_raw',this.value)" placeholder='[&#10;  {"name":"Free","price":"$0","period":"forever","features":["Journal (3 accounts)","Basic stats"],"cta":"Get Started","url":"auth.html","featured":false},&#10;  {"name":"Pro","price":"$19","period":"month","features":["Unlimited journals","AI Coach","Priority support"],"cta":"Start Free Trial","url":"auth.html","featured":true}&#10;]'>${esc(d.tiers_raw||'')}</textarea>
        </div>`;
      break;
    case'cta':
      fields=`
        <div><label class="et-form-label">Headline</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Ready to get started?"></div>
        <div><label class="et-form-label">Subtitle</label><input type="text" class="et-form-input" value="${esc(d.subtitle||'')}" oninput="updateSection(${i},'subtitle',this.value)"></div>
        <div class="et-form-grid2">
          <div><label class="et-form-label">Button Text</label><input type="text" class="et-form-input" value="${esc(d.btn_text||'')}" oninput="updateSection(${i},'btn_text',this.value)" placeholder="Get Started →"></div>
          <div><label class="et-form-label">Button URL</label><input type="text" class="et-form-input" value="${esc(d.btn_url||'')}" oninput="updateSection(${i},'btn_url',this.value)" placeholder="auth.html"></div>
        </div>`;
      break;
    case'faq':
      fields=`
        <div><label class="et-form-label">Section Title</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Frequently Asked Questions"></div>
        <div>
          <label class="et-form-label">Questions (one per line: Question | Answer)</label>
          <textarea class="et-form-input" rows="8" style="resize:vertical;font-family:'DM Mono',monospace;font-size:12px" oninput="updateSection(${i},'items_raw',this.value)" placeholder="What is EaglePips? | EaglePips is a professional trading platform...&#10;How much does it cost? | We offer a free plan...">${esc(d.items_raw||'')}</textarea>
          <div style="font-size:11px;color:var(--white3);margin-top:4px">Format: Question | Answer</div>
        </div>`;
      break;
    case'contact':
      fields=`
        <div><label class="et-form-label">Section Title</label><input type="text" class="et-form-input" value="${esc(d.title||'')}" oninput="updateSection(${i},'title',this.value)" placeholder="Get in touch"></div>
        <div><label class="et-form-label">Subtitle</label><input type="text" class="et-form-input" value="${esc(d.subtitle||'')}" oninput="updateSection(${i},'subtitle',this.value)"></div>
        <div class="et-form-grid2">
          <div><label class="et-form-label">Email</label><input type="email" class="et-form-input" value="${esc(d.email||'')}" oninput="updateSection(${i},'email',this.value)" placeholder="hello@eaglepips.com"></div>
          <div><label class="et-form-label">Phone (optional)</label><input type="text" class="et-form-input" value="${esc(d.phone||'')}" oninput="updateSection(${i},'phone',this.value)" placeholder="+40 700 000 000"></div>

        ${i<sections.length-1?`<button style="width:24px;height:24px;background:none;border:1px solid var(--border2);color:var(--white3);cursor:pointer;border-radius:3px;font-size:11px;transition:all 0.15s" onclick="moveSection(${i},1)" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">↓</button>`:''}

}

function toggleSC(i){const b=document.getElementById('scb-'+i);b?.classList.toggle('collapsed');}
function updateSection(i,key,val){if(sections[i])sections[i].data={...sections[i].data,[key]:val};}
function moveSection(i,dir){
  const ni=i+dir;if(ni<0||ni>=sections.length)return;
  [sections[i],sections[ni]]=[sections[ni],sections[i]];
  renderSectionsEditor();
}
function removeSection(i){if(confirm('Remove this section?')){sections.splice(i,1);renderSectionsEditor();}}
function addSection(type){
  sections.push({type,title:SECTION_TYPES[type]?.label||type,data:{}});
  renderSectionsEditor();
  // Scroll to new section
  setTimeout(()=>document.getElementById(`sc-${sections.length-1}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// Save
async function savePage(publish){
  const title=document.getElementById('pTitle')?.value.trim();
  const slug=document.getElementById('pSlug')?.value.trim();
  if(!title||!slug){alert('Title and slug are required.');return;}
  const payload={
    title,slug,
    template:document.querySelector('.tpl-card.selected')?.dataset?.key||document.querySelector('.tpl-card.selected')?.onclick?.toString().match(/'(\w+)'/)?.[1]||'simple',
    meta_description:document.getElementById('pMeta')?.value.trim()||null,
    sections:sections,
    published:publish,
    updated_at:new Date().toISOString()
  };
  // Get template from selected card
  const selCard=document.querySelector('.tpl-card.selected');
  if(selCard){
    const onclick=selCard.getAttribute('onclick');
    const match=onclick?.match(/selectTemplate\('(\w+)'\)/);
    if(match)payload.template=match[1];
  }
  setSaveStatus('Saving...');
  let err;
  if(editingId){
    const r=await _sb.from('pages').update(payload).eq('id',editingId);err=r.error;
  } else {
    const r=await _sb.from('pages').insert(payload).select().single();
    err=r.error;if(!err&&r.data)editingId=r.data.id;
  }
  if(err){alert(err.message);setSaveStatus('Error');return;}
  setSaveStatus(publish?'✓ Published':'✓ Saved');
  await loadPages();
}

async function delPage(id){
  if(!confirm('Delete this page?'))return;
  await _sb.from('pages').delete().eq('id',id);
  if(editingId===id){editingId=null;sections=[];document.getElementById('pageEditor').innerHTML='<div style="text-align:center;padding:40px;color:var(--white3);font-size:13px">Select a page or create a new one</div>';}
  await loadPages();
}

    default:

function parseMd(c){
  if(!c)return'';
  return c.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>').split('\n\n').map(b=>{b=b.trim();if(!b||b.startsWith('<'))return b;return'<p>'+b.replace(/\n/g,'<br>')+'</p>';}).join('');
}

function downloadHTML(){
  const slug=document.getElementById('pSlug')?.value||'page';
  const html=generateHTML();
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${slug}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function previewHTML(){
  const html=generateHTML();
  const el=document.getElementById('htmlPreview');
  const code=document.getElementById('htmlCode');
  if(el.style.display==='none'){
    el.style.display='block';
    code.textContent=html.substring(0,3000)+(html.length>3000?'\n\n... (truncated for display)':'');
  } else {
    el.style.display='none';
  }
}

function esc(str){return(str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
