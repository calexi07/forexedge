<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForexEdge — News Sentiment</title>
<link rel="stylesheet" href="styles.css">
<style>
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:blink 1.5s ease-in-out infinite;display:inline-block}
.nav-badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid var(--border);background:var(--gold-dim);color:var(--gold);border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:28px}
.tab-btn{padding:10px 24px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Outfit',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-bottom:-1px}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.filter-btn{padding:4px 13px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.05em;cursor:pointer;border-radius:20px;transition:all 0.15s}
.filter-btn:hover{border-color:var(--border);color:var(--text2)}
.filter-btn.active{background:var(--gold-dim);border-color:var(--border);color:var(--gold)}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.news-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s}
.news-card:hover{border-color:var(--border)}
.card-thumb{height:140px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:46px;border-bottom:1px solid var(--border2);position:relative}
.card-impact{position:absolute;top:8px;left:8px;font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;letter-spacing:0.1em;text-transform:uppercase;border-radius:2px}
.card-impact.high{background:var(--bear-bg);color:var(--bear);border:1px solid rgba(224,92,92,0.2)}
.card-impact.med{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border)}
.card-impact.low{background:rgba(100,100,100,0.1);color:var(--text3);border:1px solid var(--border2)}
.card-body{padding:14px}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.card-source{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.card-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.ctag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;font-weight:500;display:inline-flex;align-items:center;gap:3px;letter-spacing:0.05em}
.ctag.bull{background:var(--bull-bg);color:var(--bull);border:1px solid rgba(76,175,125,0.2)}
.ctag.bear{background:var(--bear-bg);color:var(--bear);border:1px solid rgba(224,92,92,0.2)}
.ctag.neutral{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border2)}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin:10px 0 6px}
.card-summary{font-size:12px;color:var(--text2);line-height:1.6}
.card-ai{margin-top:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;border-left:2px solid var(--gold)}
.card-ai-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px}
.card-ai-text{font-size:12px;color:var(--text2);line-height:1.6}
.card-ai-text.loading{color:var(--text3);font-style:italic}
.btn-analyze{margin-top:8px;padding:5px 12px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;cursor:pointer;border-radius:var(--radius);transition:all 0.2s}
.btn-analyze:hover{border-color:var(--gold);color:var(--gold)}
.btn-analyze:disabled{opacity:0.4;pointer-events:none}
.analytics-wrap{display:flex;flex-direction:column;gap:20px}
.top-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.top-card{background:var(--bg2);border:1px solid var(--border2);padding:18px 22px;border-radius:var(--radius)}
.top-card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.top-card-flag{font-size:22px;margin-bottom:4px}
.top-card-pair{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--text);line-height:1}
.top-card-score{font-family:'DM Mono',monospace;font-size:12px;margin-top:4px;font-weight:500}
.top-card-score.bull{color:var(--bull)}
.top-card-score.bear{color:var(--bear)}
.top-card-score.blue{color:#4a9eff}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--bg2);border:1px solid var(--border2);padding:18px 22px;border-radius:var(--radius)}
.chart-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.chart-sub{font-size:11px;color:var(--text3);margin-bottom:16px;font-family:'DM Mono',monospace}
.lb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2)}
.lb-row:last-child{border-bottom:none}
.lb-flag{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.lb-pair{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text);width:34px;flex-shrink:0}
.lb-bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.lb-bar{height:100%;border-radius:3px;transition:width 0.8s ease}
.lb-bar.bull{background:var(--bull)}
.lb-bar.bear{background:var(--bear)}
.lb-score{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;width:42px;text-align:right;flex-shrink:0}
.lb-score.bull{color:var(--bull)}
.lb-score.bear{color:var(--bear)}
.bd-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2)}
.bd-row:last-child{border-bottom:none}
.bd-bars{flex:1;display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px}
.bd-bull{background:var(--bull);height:100%}
.bd-bear{background:var(--bear);height:100%}
.bd-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);width:30px;text-align:right;flex-shrink:0}
.ai-summary-card{background:var(--bg2);border:1px solid var(--border);padding:22px;border-radius:var(--radius);border-left:3px solid var(--gold)}
.ai-summary-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-summary-text{font-size:13px;color:var(--text2);line-height:1.8}
.ai-summary-text.loading{color:var(--text3);font-style:italic}
.btn-ai-summary{padding:8px 16px;background:var(--gold);border:1px solid var(--gold);color:#080808;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;margin-top:12px}
.btn-ai-summary:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-ai-summary:disabled{opacity:0.5;pointer-events:none}
.page-top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:14px}
.btn-refresh{padding:7px 16px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:var(--radius);transition:all 0.2s;display:flex;align-items:center;gap:6px}
.btn-refresh:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:768px){.top-cards{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}.news-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="navMount"></div>

<div class="page-wrap">
  <div class="page-top-bar">
    <div>
      <div class="page-label">// Live Intelligence</div>
      <h1 class="page-title">News <strong>Sentiment</strong></h1>
      <p class="page-sub">Latest forex news with AI-powered sentiment analysis and market intelligence.</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="nav-badge"><div class="live-dot"></div>Live</div>
      <span id="lastUpdate" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">—</span>
      <button class="btn-refresh" id="refreshBtn" onclick="loadNews()">↺ Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabFeed" onclick="switchTab('feed')">📰 Feed</button>
    <button class="tab-btn" id="tabAnalytics" onclick="switchTab('analytics')">📊 Analytics</button>
  </div>

  <div id="feedTab">
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
      <button class="filter-btn" onclick="setFilter('EUR',this)">🇪🇺 EUR</button>
      <button class="filter-btn" onclick="setFilter('USD',this)">🇺🇸 USD</button>
      <button class="filter-btn" onclick="setFilter('GBP',this)">🇬🇧 GBP</button>
      <button class="filter-btn" onclick="setFilter('JPY',this)">🇯🇵 JPY</button>
      <button class="filter-btn" onclick="setFilter('AUD',this)">🇦🇺 AUD</button>
      <button class="filter-btn" onclick="setFilter('CAD',this)">🇨🇦 CAD</button>
      <button class="filter-btn" onclick="setFilter('CHF',this)">🇨🇭 CHF</button>
      <button class="filter-btn" onclick="setFilter('XAU',this)">🥇 XAU</button>
      <button class="filter-btn" onclick="setFilter('OIL',this)">🛢️ OIL</button>
    </div>
    <div class="news-grid" id="newsGrid"><div style="text-align:center;padding:60px;color:var(--text3)">Loading news...</div></div>
  </div>

  <div id="analyticsTab" style="display:none">
    <div class="analytics-wrap" id="analyticsWrap"><div style="text-align:center;padding:60px;color:var(--text3)">Loading analytics...</div></div>
  </div>
</div>

<footer>
  <div class="footer-logo">Forex<span>Edge</span></div>
  <ul class="footer-links"><li><a href="index.html">Home</a></li><li><a href="journal.html">Journal</a></li><li><a href="academy.html">Academy</a></li><li><a href="tools.html">Tools</a></li></ul>
  <div class="footer-copy">© 2026 ForexEdge. All rights reserved.</div>
</footer>

<div id="modalMount"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nav.js"></script>
<script>
// ══ CONFIG ══
const API_KEY = 'YOUR_API_KEY_HERE';

renderNav('news');
renderModal();

const NEWS = [
  {id:1,source:'Bloomberg',time:'14 min ago',impact:'high',title:"ECB's Villeroy signals rate hike likely as core inflation remains sticky",summary:"ECB council member says next move is likely a rate hike. Markets reprice EUR rate expectations significantly higher.",currencies:['EUR','CHF'],sentiment:{EUR:'bull',CHF:'bull'},icon:'🇪🇺'},
  {id:2,source:'Reuters',time:'41 min ago',impact:'high',title:"US NFP misses forecast: 48K jobs added vs 65K expected, unemployment rises",summary:"Weak US labour market data strengthens Fed rate cut expectations. Dollar selling pressure broad-based.",currencies:['USD','JPY','XAU'],sentiment:{USD:'bear',JPY:'bull',XAU:'bull'},icon:'🇺🇸'},
  {id:3,source:'ForexLive',time:'1h ago',impact:'med',title:"BOE's Bailey: inflation progress encouraging but premature to declare victory",summary:"Neutral tone from Bailey leaves GBP directionless. Markets await UK CPI data.",currencies:['GBP'],sentiment:{GBP:'neutral'},icon:'🇬🇧'},
  {id:4,source:'DailyFX',time:'2h ago',impact:'med',title:"China PMI beats at 52.4, boosting commodity and risk-on currency outlook",summary:"Strong Chinese manufacturing data supports AUD, NZD and commodity-linked currencies.",currencies:['AUD','NZD','XAU'],sentiment:{AUD:'bull',NZD:'bull',XAU:'bull'},icon:'🇨🇳'},
  {id:5,source:'Bloomberg',time:'3h ago',impact:'high',title:"Oil surges 4% as Iran-US tensions escalate in Strait of Hormuz",summary:"Supply disruption fears push crude higher. NOK and CAD benefit. JPY and CHF see safe-haven demand.",currencies:['OIL','NOK','CAD','JPY'],sentiment:{OIL:'bull',NOK:'bull',CAD:'bull',JPY:'bull'},icon:'🛢️'},
  {id:6,source:'FXStreet',time:'4h ago',impact:'med',title:"Fed's Williams: two rate cuts still appropriate for 2026 if data cooperates",summary:"Dovish Fed signals put downward pressure on USD. EUR/USD and GBP/USD find support.",currencies:['USD','EUR','GBP'],sentiment:{USD:'bear',EUR:'bull',GBP:'bull'},icon:'🏦'},
  {id:7,source:'Reuters',time:'5h ago',impact:'high',title:"Gold breaks $3,150 resistance as dollar weakens and safe-haven demand rises",summary:"XAU/USD clears key technical level backed by weak USD, geopolitical risk, and central bank buying.",currencies:['XAU','USD'],sentiment:{XAU:'bull',USD:'bear'},icon:'🥇'},
  {id:8,source:'Bloomberg',time:'6h ago',impact:'med',title:"BOJ minutes reveal split on rate hike timing — some members urge patience",summary:"Internal BOJ division suggests rate hike may be delayed. JPY weakens on the news.",currencies:['JPY'],sentiment:{JPY:'bear'},icon:'🇯🇵'},
];
const SCORES={EUR:+42,USD:-38,GBP:+5,JPY:+18,AUD:+22,NZD:+28,CAD:+30,CHF:+15,NOK:+55,XAU:+61,XAG:-12,OIL:+73};
const COUNTS={EUR:47,USD:106,GBP:31,JPY:46,AUD:22,NZD:14,CAD:16,CHF:20,NOK:14,XAU:37,XAG:8,OIL:459};
const FLAGS={EUR:'🇪🇺',USD:'🇺🇸',GBP:'🇬🇧',JPY:'🇯🇵',AUD:'🇦🇺',NZD:'🇳🇿',CAD:'🇨🇦',CHF:'🇨🇭',NOK:'🇳🇴',XAU:'🥇',XAG:'⬜',OIL:'🛢️'};
let activeFilter='ALL',analyticsBuilt=false,aiCache={};

function switchTab(t){
  document.getElementById('feedTab').style.display=t==='feed'?'':'none';
  document.getElementById('analyticsTab').style.display=t==='analytics'?'':'none';
  document.getElementById('tabFeed').classList.toggle('active',t==='feed');
  document.getElementById('tabAnalytics').classList.toggle('active',t==='analytics');
  if(t==='analytics'&&!analyticsBuilt){buildAnalytics();analyticsBuilt=true;}
}
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderNews();
}
function loadNews(){
  const btn=document.getElementById('refreshBtn');
  btn.textContent='↻ Loading...';
  btn.disabled=true;
  setTimeout(()=>{btn.textContent='↺ Refresh';btn.disabled=false;document.getElementById('lastUpdate').textContent='Updated '+new Date().toLocaleTimeString();renderNews();},1000);
}
function renderNews(){
  const filtered=activeFilter==='ALL'?NEWS:NEWS.filter(n=>n.currencies.includes(activeFilter));
  const grid=document.getElementById('newsGrid');
  if(!filtered.length){grid.innerHTML='<div style="text-align:center;padding:60px;color:var(--text3)">No news for this filter.</div>';return;}
  grid.innerHTML=filtered.map(n=>`
    <div class="news-card">
      <div class="card-thumb"><span>${n.icon}</span><span class="card-impact ${n.impact}">${n.impact==='high'?'🔴 HIGH':n.impact==='med'?'🟡 MED':'⚪ LOW'}</span></div>
      <div class="card-body">
        <div class="card-meta"><span class="card-source">${n.source}</span><span class="card-time">· ${n.time}</span></div>
        <div class="card-tags">${n.currencies.map(c=>{const s=n.sentiment[c]||'neutral';return`<span class="ctag ${s}">${s==='bull'?'▲':s==='bear'?'▼':'—'} ${c}</span>`}).join('')}</div>
        <div class="card-title">${n.title}</div>
        <div class="card-summary">${n.summary}</div>
        <div class="card-ai" id="ai-${n.id}">
          <div class="card-ai-label">🤖 AI Analysis</div>
          ${aiCache[n.id]?`<div class="card-ai-text">${aiCache[n.id]}</div>`:`<div class="card-ai-text loading">Click below to generate AI analysis.</div><button class="btn-analyze" id="btn-${n.id}" onclick="analyzeNews(${n.id})">Analyze with AI →</button>`}
        </div>
      </div>
    </div>`).join('');
}
async function analyzeNews(id){
  const n=NEWS.find(x=>x.id===id);if(!n)return;
  if(API_KEY==='YOUR_API_KEY_HERE'){document.querySelector(`#ai-${id} .card-ai-text`).textContent='⚠️ Add your API key first.';document.getElementById(`btn-${id}`)?.remove();return;}
  const btn=document.getElementById(`btn-${id}`);
  const textEl=document.querySelector(`#ai-${id} .card-ai-text`);
  if(btn)btn.disabled=true;
  textEl.innerHTML='<span class="spinner"></span> Analyzing...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:'You are a professional forex fundamental analyst. Analyze news in 2-3 sentences and give verdict: BULLISH/BEARISH/NEUTRAL per currency.',messages:[{role:'user',content:`News: "${n.title}"\nCurrencies: ${n.currencies.join(', ')}`}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'Analysis unavailable.';
    aiCache[id]=text;textEl.textContent=text;textEl.className='card-ai-text';btn?.remove();
  }catch(e){textEl.textContent='Analysis failed.';if(btn)btn.disabled=false;}
}
function buildAnalytics(){
  const sorted=Object.entries(SCORES).sort((a,b)=>b[1]-a[1]);
  const topBull=sorted[0],topBear=sorted[sorted.length-1],mostActive=Object.entries(COUNTS).sort((a,b)=>b[1]-a[1])[0];
  const maxAbs=Math.max(...Object.values(SCORES).map(Math.abs));
  document.getElementById('analyticsWrap').innerHTML=`
    <div class="top-cards">
      <div class="top-card"><div class="top-card-label">Top Bullish</div><div class="top-card-flag">${FLAGS[topBull[0]]}</div><div class="top-card-pair">${topBull[0]}</div><div class="top-card-score bull">+${topBull[1]}% Net</div></div>
      <div class="top-card"><div class="top-card-label">Top Bearish</div><div class="top-card-flag">${FLAGS[topBear[0]]}</div><div class="top-card-pair">${topBear[0]}</div><div class="top-card-score bear">${topBear[1]}% Net</div></div>
      <div class="top-card"><div class="top-card-label">Most Active</div><div class="top-card-flag">${FLAGS[mostActive[0]]}</div><div class="top-card-pair">${mostActive[0]}</div><div class="top-card-score blue">${mostActive[1]} Articles</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><div class="chart-title">Net Sentiment Leaderboard</div><div class="chart-sub">Ranked by net sentiment score</div>${sorted.map(([p,s])=>`<div class="lb-row"><span class="lb-flag">${FLAGS[p]||''}</span><span class="lb-pair">${p}</span><div class="lb-bar-wrap"><div class="lb-bar ${s>=0?'bull':'bear'}" style="width:${Math.abs(s)/maxAbs*100}%"></div></div><span class="lb-score ${s>=0?'bull':'bear'}">${s>=0?'+':''}${s}%</span></div>`).join('')}</div>
      <div class="chart-card"><div class="chart-title">Sentiment Breakdown</div><div class="chart-sub">Article distribution per currency</div>${sorted.map(([p,s])=>{const bp=Math.round(50+s/2),bp2=100-bp;return`<div class="bd-row"><span class="lb-flag">${FLAGS[p]||''}</span><span class="lb-pair">${p}</span><div class="bd-bars"><div class="bd-bear" style="width:${bp2}%"></div><div class="bd-bull" style="width:${bp}%"></div></div><span class="bd-count">${COUNTS[p]||0}</span></div>`}).join('')}</div>
    </div>
    <div class="ai-summary-card">
      <div class="ai-summary-label">🤖 AI Market Summary</div>
      <div class="ai-summary-text loading" id="aiSumText">Click below to generate an AI-powered market summary.</div>
      <button class="btn-ai-summary" id="btnAiSum" onclick="genSummary()">Generate Market Summary →</button>
    </div>`;
}
async function genSummary(){
  if(API_KEY==='YOUR_API_KEY_HERE'){document.getElementById('aiSumText').textContent='⚠️ Add your API key first.';return;}
  const btn=document.getElementById('btnAiSum');const textEl=document.getElementById('aiSumText');
  btn.disabled=true;textEl.innerHTML='<span class="spinner"></span> Generating...';
  const data=Object.entries(SCORES).sort((a,b)=>b[1]-a[1]).map(([p,s])=>`${p}: ${s>=0?'+':''}${s}%`).join(', ');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:'You are a professional forex market analyst. Write concise daily market sentiment summaries.',messages:[{role:'user',content:`Today's sentiment: ${data}\n\nWrite a 3-4 sentence market summary with key themes and actionable insights.`}]})});
    const d=await res.json();const text=d.content?.[0]?.text||'Summary unavailable.';
    textEl.textContent=text;textEl.className='ai-summary-text';btn.remove();
  }catch(e){textEl.textContent='Generation failed.';btn.disabled=false;}
}
document.getElementById('lastUpdate').textContent='Updated '+new Date().toLocaleTimeString();
renderNews();
</script>
</body>
</html>
