<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForexEdge — Confirming...</title>
<link rel="stylesheet" href="styles.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;padding:48px;max-width:400px}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--text);margin-bottom:32px;letter-spacing:0.08em}
.logo span{color:var(--gold)}
.icon{font-size:48px;margin-bottom:16px}
.title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:8px}
.sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.spinner-lg{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
.btn-back{display:inline-flex;padding:12px 28px;background:var(--gold);color:#080808;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;border-radius:var(--radius);transition:all 0.2s;border:none;cursor:pointer}
.btn-back:hover{background:var(--gold2)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Forex<span>Edge</span></div>
  <div id="content">
    <div class="spinner-lg"></div>
    <div class="title">Confirming account...</div>
    <div class="sub">Please wait while we verify your email.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="initAndHandle()"></script>
<script>
const SUPABASE_URL = 'https://vaimxhgqcdhjhdiaampa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';
let _sb;

function initAndHandle() {
  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  handleCallback();
}

function showError(msg){
  document.getElementById('content').innerHTML=`
    <div class="icon">❌</div>
    <div class="title">Something went wrong</div>
    <div class="sub">${msg}</div>
    <a href="auth.html" class="btn-back">Back to Sign In</a>`;
}

function showSuccess(msg,redirect){
  document.getElementById('content').innerHTML=`
    <div class="icon">✅</div>
    <div class="title">Email confirmed!</div>
    <div class="sub">${msg}</div>`;
  setTimeout(()=>window.location.href=redirect,1800);
}

async function handleCallback(){
  const hash=window.location.hash.substring(1);
  const params=new URLSearchParams(hash);
  const accessToken=params.get('access_token');
  const refreshToken=params.get('refresh_token')||'';
  const type=params.get('type');
  const errDesc=params.get('error_description');
  if(errDesc){showError(decodeURIComponent(errDesc));return;}
  if(!accessToken){showError('Invalid or expired link. Please sign up again.');return;}
  try{
    const{error}=await _sb.auth.setSession({access_token:accessToken,refresh_token:refreshToken});
    if(error){showError(error.message);return;}
    if(type==='recovery'){
      document.getElementById('content').innerHTML=`
        <div class="icon">🔑</div>
        <div class="title">Reset your password</div>
        <div class="sub">Enter your new password below.</div>
        <div style="margin-top:20px;text-align:left">
          <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="newPass" placeholder="Min. 8 characters"></div>
          <button onclick="resetPass()" class="btn-back" style="width:100%;justify-content:center;margin-top:10px">Update Password →</button>
        </div>`;
    }else{
      showSuccess('Your account is ready. Redirecting to your journal...','journal.html');
    }
  }catch(err){
    showError(err.message||'Unexpected error. Please try again.');
  }
}

async function resetPass(){
  const pass=document.getElementById('newPass')?.value;
  if(!pass||pass.length<8){alert('Password must be at least 8 characters.');return;}
  const{error}=await _sb.auth.updateUser({password:pass});
  if(error){alert(error.message);return;}
  document.getElementById('content').innerHTML=`<div class="icon">✅</div><div class="title">Password updated!</div><div class="sub">Redirecting to sign in...</div>`;
  setTimeout(()=>window.location.href='auth.html',1500);
}
</script>
</body>
</html>
