<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Backtest Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
<style>
/* ── HEADER ─────────────────────────────────────────── */
.bt-header{padding:20px 24px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.bt-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bt-title{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--white)}
.bt-meta-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.bt-tag{font-family:"DM Mono",monospace;font-size:9px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);color:var(--white3);border-radius:100px}

/* ── STATS ROW ──────────────────────────────────────── */
.bt-stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--border2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:16px}
.bt-stat-box{background:var(--bg2);padding:14px 16px;text-align:center}
.bt-stat-val{font-family:"DM Mono",monospace;font-size:20px;font-weight:500;margin-bottom:3px}
.bt-stat-lbl{font-family:"DM Mono",monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.1em;color:var(--white3)}

/* ── EQUITY CURVE ───────────────────────────────────── */
.bt-chart-wrap{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:16px;margin-bottom:16px}
.bt-chart-title{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--white3);margin-bottom:12px}
#eqCanvas{width:100%;height:140px;display:block}

/* ── COLUMNS BUILDER ────────────────────────────────── */
.col-builder{background:var(--bg2);border:1px solid var(--gold-border);border-radius:6px;padding:18px;margin-bottom:16px}
.col-builder-title{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.col-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.col-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px}
.col-drag{cursor:grab;color:var(--white3);font-size:13px;flex-shrink:0}
.col-name-input{flex:1;background:none;border:none;color:var(--white);font-family:"Syne",sans-serif;font-size:12px;outline:none}
.col-name-input::placeholder{color:var(--white3)}
.col-type-sel{background:var(--bg);border:1px solid var(--border2);color:var(--white2);font-family:"DM Mono",monospace;font-size:10px;padding:3px 6px;border-radius:3px;outline:none;cursor:pointer}
.col-del{background:none;border:none;color:var(--white3);cursor:pointer;font-size:13px;padding:0 2px;transition:color 0.15s;flex-shrink:0}
.col-del:hover{color:var(--bear)}
.add-col-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:transparent;border:1px dashed rgba(200,169,110,0.25);color:rgba(200,169,110,0.5);font-family:"DM Mono",monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all 0.15s;width:100%}
.add-col-btn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}

/* ── FILTER BAR ─────────────────────────────────────── */
.bt-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;margin-bottom:12px}
.bt-filter-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--white2);font-family:"DM Mono",monospace;font-size:10px;padding:5px 10px;border-radius:3px;outline:none;cursor:pointer;transition:border-color 0.15s}
.bt-filter-sel:focus{border-color:var(--gold-border)}
.bt-filter-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--white3);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0}
.bt-clear-filters{background:none;border:none;font-family:"DM Mono",monospace;font-size:9px;color:var(--white3);cursor:pointer;padding:4px 8px;transition:color 0.15s;letter-spacing:0.06em}
.bt-clear-filters:hover{color:var(--gold)}

/* ── TRADES TABLE ───────────────────────────────────── */
.bt-table-wrap{overflow-x:auto;border:1px solid var(--border2);border-radius:4px}
.bt-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
.bt-table th{padding:9px 12px;background:var(--bg3);border-bottom:1px solid var(--border2);font-family:"DM Mono",monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--white3);text-align:left;position:sticky;top:0;z-index:2}
.bt-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--white2);vertical-align:middle}
.bt-table tr:hover td{background:rgba(255,255,255,0.02)}
.bt-table tr:last-child td{border-bottom:none}
.bt-table td[contenteditable="true"]:focus{background:rgba(200,169,110,0.06);outline:1px solid var(--gold-border);border-radius:2px}
.result-w{color:var(--bull);font-weight:600}
.result-l{color:var(--bear);font-weight:600}
.result-be{color:var(--white2)}
.rr-pos{color:var(--bull)}
.rr-neg{color:var(--bear)}
.row-del-btn{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:2px 4px;transition:color 0.15s}
tr:hover .row-del-btn{color:var(--white3)}
.row-del-btn:hover{color:var(--bear)!important}
.add-trade-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-top:1px solid var(--border2);background:var(--bg2);cursor:pointer;font-family:"DM Mono",monospace;font-size:10px;color:var(--white3);transition:all 0.15s}
.add-trade-row:hover{background:var(--gold-dim);color:var(--gold)}
</style>
</head>
<body class="et-loading">
<div id="et-loader">
  <div class="et-loader-logo"><img src="https://vaimxhgqcdhjhdiaampa.supabase.co/storage/v1/object/public/EaglePips/design-f-r--titlu-1776494279309.png" style="width:40px;height:40px;object-fit:contain;animation:etLoaderPulse 1.5s ease-in-out infinite" alt="EaglePips"><div class="et-loader-name">Eagle<span>Pips</span></div></div>
  <div class="et-loader-bar"><div class="et-loader-bar-fill"></div></div>
  <div class="et-loader-text">Loading backtest...</div>
</div>
<div id="etSidebarMount"></div>

<div class="hub-main">
  <div class="hub-topbar">
    <a href="hub-backtests.html" style="background:none;border:1px solid var(--border2);color:var(--white3);padding:5px 10px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">← Backtests</a>
    <div class="hub-topbar-title" style="flex:1;margin-left:10px">🔬 <strong id="btPageTitle">Backtest</strong></div>
    <span id="saveStatus" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3)"></span>
    <button class="et-btn-ghost" onclick="confirmDelete()" style="padding:6px 12px;font-size:11px;color:var(--bear);border-color:rgba(224,92,92,0.2)">🗑 Delete</button>
  </div>

  <div class="hub-content et-fade" id="btDetailContent">
    <div style="text-align:center;padding:60px"><div class="et-spinner"></div></div>
  </div>
</div>

<script src="hub-sidebar.js"></script>
<script>
const params = new URLSearchParams(location.search);
const BT_ID = params.get('id');
const SETUP_MODE = params.get('setup') === '1';
let _user, _sb, bt = null, trades = [], filteredTrades = [], filterValues = {};
let saveTimer = null;

// ── COLUMN TYPES ────────────────────────────────────────────────────────
const COL_TYPES = [
  { val:'text',   label:'Text' },
  { val:'number', label:'Number' },
  { val:'select', label:'Select (dropdown)' },
  { val:'result', label:'Result (W/L/BE)' },
  { val:'rr',     label:'R:R (number)' },
  { val:'date',   label:'Date' },
];

async function main() {
  const res = await initEtSidebar('backtests');
  if (!res) return;
  _user = res.user; _sb = res.sb;
  if (!BT_ID) { window.location.href = 'hub-backtests.html'; return; }
  await loadBt();
}

async function loadBt() {
  const [btRes, tradeRes] = await Promise.all([
    _sb.from('backtests').select('*').eq('id', BT_ID).eq('user_id', _user.id).single(),
    _sb.from('backtest_trades').select('*').eq('backtest_id', BT_ID).order('created_at', { ascending: true })
  ]);
  if (btRes.error || !btRes.data) { window.location.href = 'hub-backtests.html'; return; }
  bt = btRes.data;
  trades = tradeRes.data || [];
  document.getElementById('btPageTitle').textContent = bt.name;
  renderDetail();
  if (SETUP_MODE) setTimeout(() => document.getElementById('colBuilder')?.scrollIntoView({ behavior: 'smooth' }), 400);
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderDetail() {
  const el = document.getElementById('btDetailContent');
  const cols = bt.columns || [];

  // Build filter options per text/select column
  const filterableCols = cols.filter(c => ['text','select','result'].includes(c.type));

  el.innerHTML = `
    <!-- Header info -->
    <div class="bt-header">
      <div class="bt-color-dot" style="background:${bt.color||'#c8a96e'}"></div>
      <div>
        <div class="bt-title">${bt.name}</div>
        ${bt.description ? `<div style="font-size:12px;color:var(--white3);margin-top:2px">${bt.description}</div>` : ''}
      </div>
      <div class="bt-meta-tags">
        ${bt.symbol ? `<span class="bt-tag" style="color:${bt.color||'#c8a96e'};border-color:${bt.color||'#c8a96e'}40;background:${bt.color||'#c8a96e'}10">${bt.symbol}</span>` : ''}
        ${bt.period ? `<span class="bt-tag">${bt.period}</span>` : ''}
      </div>
    </div>

    <!-- Stats -->
    <div class="bt-stats-row" id="btStatsRow"></div>

    <!-- Equity curve -->
    <div class="bt-chart-wrap">
      <div class="bt-chart-title">Equity Curve (Cumulative R)</div>
      <canvas id="eqCanvas"></canvas>
    </div>

    <!-- Column builder -->
    <div class="col-builder" id="colBuilder">
      <div class="col-builder-title">
        <span>⚙ Column Builder</span>
        <span style="font-size:10px;color:var(--white3);font-family:'Syne',sans-serif;text-transform:none;letter-spacing:0;font-weight:400">Define what data you track per trade</span>
      </div>
      <div class="col-list" id="colList"></div>
      <button class="add-col-btn" onclick="addColumn()">＋ Add Criteria / Column</button>
      <div style="display:flex;justify-content:flex-end;margin-top:10px">
        <button class="et-btn-gold" onclick="saveColumns()" style="padding:7px 18px;font-size:11px">Save Columns</button>
      </div>
    </div>

    <!-- Filters -->
    ${filterableCols.length ? `
    <div class="bt-filters" id="btFilters">
      <span class="bt-filter-label">Filter by:</span>
      ${filterableCols.map(c => {
        if (c.type === 'result') {
          return `<select class="bt-filter-sel" data-col="${c.id}" onchange="applyFilters()">
            <option value="">All Results</option>
            <option value="W">Win</option>
            <option value="L">Loss</option>
            <option value="BE">Breakeven</option>
          </select>`;
        }
        const vals = [...new Set(trades.map(t => (t.data||{})[c.id]).filter(Boolean))].sort();
        if (!vals.length) return '';
        return `<select class="bt-filter-sel" data-col="${c.id}" onchange="applyFilters()">
          <option value="">${c.name}: All</option>
          ${vals.map(v => `<option value="${v}">${v}</option>`).join('')}
        </select>`;
      }).join('')}
      <button class="bt-clear-filters" onclick="clearFilters()">✕ Clear</button>
    </div>` : ''}

    <!-- Trades table -->
    <div class="bt-table-wrap" id="btTableWrap"></div>
  `;

  renderColumnBuilder();
  applyFilters();
}

// ── COLUMNS ──────────────────────────────────────────────────────────────
function renderColumnBuilder() {
  const list = document.getElementById('colList');
  if (!list) return;
  const cols = bt.columns || [];
  list.innerHTML = cols.map((col, i) => `
    <div class="col-row" data-idx="${i}">
      <span class="col-drag">⠿</span>
      <input type="text" class="col-name-input" value="${col.name||''}" placeholder="Column name" oninput="updateCol(${i},'name',this.value)">
      <select class="col-type-sel" onchange="updateCol(${i},'type',this.value)">
        ${COL_TYPES.map(t => `<option value="${t.val}" ${col.type===t.val?'selected':''}>${t.label}</option>`).join('')}
      </select>
      <button class="col-del" onclick="removeCol(${i})">✕</button>
    </div>`).join('');
}

function addColumn() {
  const cols = bt.columns || [];
  cols.push({ id: 'col_' + Date.now(), name: '', type: 'text' });
  bt.columns = cols;
  renderColumnBuilder();
}

function updateCol(i, key, val) {
  bt.columns[i][key] = val;
  scheduleSave();
}

function removeCol(i) {
  bt.columns.splice(i, 1);
  renderColumnBuilder();
  scheduleSave();
}

async function saveColumns() {
  const { error } = await _sb.from('backtests').update({ columns: bt.columns }).eq('id', BT_ID);
  if (error) { alert('Save error: ' + error.message); return; }
  showStatus('✓ Columns saved');
  renderDetail();
}

// ── FILTERS ──────────────────────────────────────────────────────────────
function applyFilters() {
  const sels = document.querySelectorAll('.bt-filter-sel');
  filterValues = {};
  sels.forEach(s => { if (s.value) filterValues[s.dataset.col] = s.value; });

  filteredTrades = trades.filter(t => {
    return Object.entries(filterValues).every(([colId, val]) => {
      const cell = (t.data || {})[colId];
      return String(cell||'').toLowerCase() === String(val).toLowerCase();
    });
  });

  renderStats();
  renderEquityCurve();
  renderTable();
}

function clearFilters() {
  document.querySelectorAll('.bt-filter-sel').forEach(s => s.value = '');
  applyFilters();
}

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats() {
  const col = document.getElementById('btStatsRow');
  if (!col) return;
  const t = filteredTrades;
  const n = t.length;

  // Find result column and RR column
  const cols = bt.columns || [];
  const resCol = cols.find(c => c.type === 'result');
  const rrCol = cols.find(c => c.type === 'rr');

  let wins=0, losses=0, be=0, totalRR=0, maxDD=0, streak=0, bestStreak=0, curStreak=0;
  t.forEach(tr => {
    const d = tr.data || {};
    const res = resCol ? d[resCol.id] : null;
    const rr = rrCol ? parseFloat(d[rrCol.id])||0 : 0;
    totalRR += rr;
    if (res === 'W') { wins++; curStreak = Math.max(0, curStreak)+1; bestStreak = Math.max(bestStreak, curStreak); }
    else if (res === 'L') { losses++; curStreak = Math.min(0, curStreak)-1; }
    else if (res === 'BE') be++;
    else curStreak = 0;
  });

  // Max drawdown from equity curve
  let peak=0, dd=0, cumRR=0;
  t.forEach(tr => {
    const d = tr.data||{};
    const rr = rrCol ? parseFloat(d[rrCol.id])||0 : 0;
    cumRR += rr;
    if (cumRR > peak) peak = cumRR;
    dd = Math.min(dd, cumRR - peak);
    maxDD = Math.min(maxDD, dd);
  });

  const wr = n > 0 ? Math.round(wins/n*100) : 0;
  const avg = n > 0 && rrCol ? (totalRR/n).toFixed(2) : '-';
  const pfactor = losses > 0 && rrCol ? (wins/losses).toFixed(2) : '-';

  col.innerHTML = [
    { val: n, lbl: 'Trades', color: 'var(--white)' },
    { val: wr+'%', lbl: 'Win Rate', color: wr>=50?'var(--bull)':wr<40?'var(--bear)':'var(--white)' },
    { val: wins, lbl: 'Wins', color: 'var(--bull)' },
    { val: losses, lbl: 'Losses', color: 'var(--bear)' },
    { val: be, lbl: 'Breakeven', color: 'var(--white2)' },
    { val: rrCol ? (totalRR>=0?'+':'')+totalRR.toFixed(1)+'R' : '-', lbl: 'Total R', color: rrCol?(totalRR>=0?'var(--bull)':'var(--bear)'):'var(--white2)' },
    { val: rrCol ? avg+'R' : '-', lbl: 'Avg R/Trade', color: 'var(--white)' },
    { val: rrCol ? (maxDD).toFixed(1)+'R' : '-', lbl: 'Max DD', color: 'var(--bear)' },
  ].map(s => `<div class="bt-stat-box"><div class="bt-stat-val" style="color:${s.color}">${s.val}</div><div class="bt-stat-lbl">${s.lbl}</div></div>`).join('');
}

// ── EQUITY CURVE ─────────────────────────────────────────────────────────
function renderEquityCurve() {
  const canvas = document.getElementById('eqCanvas');
  if (!canvas) return;
  const cols = bt.columns || [];
  const rrCol = cols.find(c => c.type === 'rr');
  if (!rrCol) {
    canvas.parentElement.innerHTML = '<div style="text-align:center;padding:24px;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--white3)">Add an R:R column to see the equity curve</div>';
    return;
  }

  // Build cumulative R series
  let cum = 0;
  const points = [0, ...filteredTrades.map(t => {
    cum += parseFloat((t.data||{})[rrCol.id])||0;
    return parseFloat(cum.toFixed(2));
  })];

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  const H = 140;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  if (points.length < 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = "11px 'DM Mono'";
    ctx.textAlign = 'center';
    ctx.fillText('Add trades to see equity curve', W/2, H/2);
    return;
  }

  const min = Math.min(...points), max = Math.max(...points);
  const range = Math.max(max - min, 1);
  const pad = { t:12, r:10, b:24, l:40 };
  const gW = W - pad.l - pad.r, gH = H - pad.t - pad.b;

  const xScale = (i) => pad.l + (i / (points.length-1)) * gW;
  const yScale = (v) => pad.t + gH - ((v - min) / range) * gH;

  // Zero line
  const zeroY = yScale(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.l, zeroY); ctx.lineTo(W-pad.r, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, H-pad.b);
  const finalVal = points[points.length-1];
  const mainColor = finalVal >= 0 ? '76,175,125' : '224,92,92';
  grad.addColorStop(0, `rgba(${mainColor},0.25)`);
  grad.addColorStop(1, `rgba(${mainColor},0)`);

  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(points[0]));
  points.forEach((v, i) => ctx.lineTo(xScale(i), yScale(v)));
  ctx.lineTo(xScale(points.length-1), yScale(0));
  ctx.lineTo(xScale(0), yScale(0));
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = `rgb(${mainColor})`;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.moveTo(xScale(0), yScale(points[0]));
  points.forEach((v, i) => ctx.lineTo(xScale(i), yScale(v)));
  ctx.stroke();

  // Y axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = "9px 'DM Mono'";
  ctx.textAlign = 'right';
  [min, 0, max].forEach(v => {
    const y = yScale(v);
    ctx.fillText((v>=0?'+':'')+v.toFixed(1)+'R', pad.l-4, y+3);
  });
}

// ── TABLE ─────────────────────────────────────────────────────────────────
function renderTable() {
  const wrap = document.getElementById('btTableWrap');
  if (!wrap) return;
  const cols = bt.columns || [];

  if (!cols.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:32px;font-size:13px;color:var(--white3)">
      <div style="font-size:28px;opacity:0.2;margin-bottom:10px">⚙</div>
      Add columns above to start tracking trades</div>`;
    return;
  }

  const thead = `<thead><tr>
    <th style="width:36px">#</th>
    ${cols.map(c => `<th>${c.name||'—'}<br><span style="font-size:7px;opacity:0.5">${c.type}</span></th>`).join('')}
    <th style="width:28px"></th>
  </tr></thead>`;

  const rows = filteredTrades.map((tr, idx) => `
    <tr data-id="${tr.id}">
      <td style="color:var(--white3);font-family:'DM Mono',monospace;font-size:10px">${idx+1}</td>
      ${cols.map(c => {
        const val = (tr.data||{})[c.id]||'';
        if (c.type === 'result') {
          return `<td><select class="col-type-sel" style="font-size:11px" onchange="updateCell('${tr.id}','${c.id}',this.value)">
            <option value="">—</option>
            <option value="W" ${val==='W'?'selected':''}>✓ Win</option>
            <option value="L" ${val==='L'?'selected':''}>✗ Loss</option>
            <option value="BE" ${val==='BE'?'selected':''}>↔ BE</option>
          </select></td>`;
        }
        if (c.type === 'rr') {
          const n = parseFloat(val);
          return `<td><input type="number" step="0.1" value="${val}" class="col-type-sel" style="font-size:11px;width:70px;color:${!isNaN(n)?n>=0?'var(--bull)':'var(--bear)':'var(--white2)'}" onchange="updateCell('${tr.id}','${c.id}',this.value)"></td>`;
        }
        if (c.type === 'date') {
          return `<td><input type="date" value="${val}" class="col-type-sel" style="font-size:11px" onchange="updateCell('${tr.id}','${c.id}',this.value)"></td>`;
        }
        return `<td contenteditable="true" onblur="updateCell('${tr.id}','${c.id}',this.innerText)">${val}</td>`;
      }).join('')}
      <td><button class="row-del-btn" onclick="deleteTrade('${tr.id}')">✕</button></td>
    </tr>`).join('');

  wrap.innerHTML = `
    <table class="bt-table">
      ${thead}
      <tbody>${rows || `<tr><td colspan="${cols.length+2}" style="text-align:center;padding:28px;color:var(--white3);font-size:12px">No trades yet — add your first trade below</td></tr>`}</tbody>
    </table>
    <div class="add-trade-row" onclick="addTrade()">＋ Add Trade</div>`;
}

// ── TRADE CRUD ────────────────────────────────────────────────────────────
async function addTrade() {
  const { data, error } = await _sb.from('backtest_trades').insert({
    backtest_id: BT_ID, user_id: _user.id, data: {}
  }).select().single();
  if (error) { alert('Error: ' + error.message); return; }
  trades.push(data);
  applyFilters();
  await updateBtStats();
}

async function updateCell(tradeId, colId, val) {
  const tr = trades.find(t => t.id === tradeId);
  if (!tr) return;
  tr.data = tr.data || {};
  tr.data[colId] = val.trim();
  await _sb.from('backtest_trades').update({ data: tr.data }).eq('id', tradeId);
  applyFilters();
  await updateBtStats();
  showStatus('✓ Saved');
}

async function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  trades = trades.filter(t => t.id !== id);
  await _sb.from('backtest_trades').delete().eq('id', id);
  applyFilters();
  await updateBtStats();
}

async function updateBtStats() {
  const cols = bt.columns || [];
  const resCol = cols.find(c => c.type === 'result');
  const rrCol = cols.find(c => c.type === 'rr');
  let wins=0, losses=0, be=0, totalRR=0;
  trades.forEach(t => {
    const d = t.data || {};
    const res = resCol ? d[resCol.id] : null;
    if (res === 'W') wins++;
    else if (res === 'L') losses++;
    else if (res === 'BE') be++;
    if (rrCol) totalRR += parseFloat(d[rrCol.id])||0;
  });
  const stats = { trades: trades.length, wins, losses, breakeven: be, total_rr: parseFloat(totalRR.toFixed(2)) };
  await _sb.from('backtests').update({ stats }).eq('id', BT_ID);
  bt.stats = stats;
}

async function confirmDelete() {
  if (!confirm('Delete this entire backtest and all its trades? This cannot be undone.')) return;
  await _sb.from('backtest_trades').delete().eq('backtest_id', BT_ID);
  await _sb.from('backtests').delete().eq('id', BT_ID);
  window.location.href = 'hub-backtests.html';
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveColumns, 1500);
}

function showStatus(msg) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 2500);
}

window.addEventListener('resize', () => {
  if (filteredTrades.length) renderEquityCurve();
});
</script>
