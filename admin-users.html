<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Users</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
</head>
<body class="et-loading">
<div id="et-loader">
  <div class="et-loader-logo"><div class="et-loader-eagle">🦅</div><div class="et-loader-name">Eagle<span>Pips</span></div></div>
  <div class="et-loader-bar"><div class="et-loader-bar-fill"></div></div>
  <div class="et-loader-text">Loading users...</div>
</div>
<div id="etSidebarMount"></div>
<div class="hub-main">
  <div class="hub-topbar">
    <a href="admin.html" style="background:none;border:1px solid var(--border2);color:var(--white3);padding:5px 12px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">← Admin</a>
    <div class="hub-topbar-title" style="flex:1;margin-left:14px">👥 <strong>Users</strong></div>
    <div id="userCount" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--white3)"></div>
  </div>
  <div class="hub-content" id="adminContent">
    <div style="text-align:center;padding:60px"><div class="et-spinner"></div></div>
  </div>
</div>

<!-- Role modal -->
<div class="et-modal-overlay" id="roleModal">
  <div class="et-modal" style="max-width:420px">
    <button class="et-modal-close" onclick="etCloseModal('roleModal')">✕</button>
    <div class="et-modal-title">Manage Roles</div>
    <div style="margin-bottom:18px">
      <div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px" id="rModalName">—</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--white3)" id="rModalEmail">—</div>
    </div>
    <input type="hidden" id="rUserId">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
      <label style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;cursor:pointer;transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--gold-border)'" onmouseout="this.style.borderColor='var(--border2)'">
        <input type="checkbox" id="rIsAdmin" style="width:16px;height:16px;accent-color:var(--gold)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--white)">Admin</div>
          <div style="font-size:11px;color:var(--white3)">Full access to admin panel, articles, users</div>
        </div>
      </label>
      <label style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;cursor:pointer;transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--gold-border)'" onmouseout="this.style.borderColor='var(--border2)'">
        <input type="checkbox" id="rIsMentor" style="width:16px;height:16px;accent-color:var(--gold)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--white)">Mentor</div>
          <div style="font-size:11px;color:var(--white3)">Can offer mentorship sessions to other traders</div>
        </div>
      </label>
    </div>
    <div id="rAlert" style="display:none;padding:10px 12px;background:var(--bear-bg);border:1px solid rgba(224,92,92,0.2);color:var(--bear);border-radius:3px;font-size:12px;margin-bottom:12px"></div>
    <button class="et-form-submit" onclick="saveRoles()">Save Roles →</button>
  </div>
</div>

<script>
let _user,_sb,users=[];
const SB_URL='https://vaimxhgqcdhjhdiaampa.supabase.co';
const SB_KEY='sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';

async function main(){
  const res=await initEtSidebar('admin');
  if(!res)return;
  _user=res.user;_sb=res.sb;
  if(!_user.user_metadata?.is_admin){
    document.getElementById('adminContent').innerHTML='<div style="text-align:center;padding:60px;color:var(--white3)">Access denied.</div>';
    return;
  }
  await loadUsers();
}

async function loadUsers(){
  // Load from profiles table
  const{data:profiles,error}=await _sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error||!profiles){
    // Fallback - try auth users via RPC or just show current approach
    document.getElementById('adminContent').innerHTML=`
      <div style="padding:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;margin-bottom:16px">
        <div style="font-size:13px;color:var(--white2);line-height:1.7;margin-bottom:12px">
          ⚠️ To view all users, you need to create a <code style="font-family:'DM Mono',monospace;font-size:12px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:2px;color:var(--gold)">profiles</code> table in Supabase that auto-populates on signup.
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--white3);background:var(--bg3);padding:14px;border-radius:3px;line-height:1.8">
          Run in SQL Editor:<br><br>
          create table profiles (<br>
          &nbsp;&nbsp;id uuid references auth.users primary key,<br>
          &nbsp;&nbsp;email text,<br>
          &nbsp;&nbsp;full_name text,<br>
          &nbsp;&nbsp;created_at timestamp default now()<br>
          );<br><br>
          create or replace function handle_new_user()<br>
          returns trigger as $$<br>
          begin<br>
          &nbsp;&nbsp;insert into public.profiles (id, email, full_name)<br>
          &nbsp;&nbsp;values (new.id, new.email, new.raw_user_meta_data->>'full_name');<br>
          &nbsp;&nbsp;return new;<br>
          end;<br>
          $$ language plpgsql security definer;<br><br>
          create trigger on_auth_user_created<br>
          &nbsp;&nbsp;after insert on auth.users<br>
          &nbsp;&nbsp;for each row execute procedure handle_new_user();
        </div>
      </div>`;
    return;
  }

  users=profiles||[];
  document.getElementById('userCount').textContent=`${users.length} user${users.length!==1?'s':''}`;
  renderUsers();
}

function renderUsers(){
  const el=document.getElementById('adminContent');
  if(!users.length){
    el.innerHTML='<div style="text-align:center;padding:60px;color:var(--white3);font-size:13px">No users registered yet.</div>';
    return;
  }

  el.innerHTML=`
    <div style="margin-bottom:16px;display:flex;gap:10px">
      <input type="text" class="et-form-input" id="userSearch" placeholder="Search by name or email..." oninput="filterUsers()" style="max-width:320px;padding:8px 12px;font-size:13px">
    </div>
    <div class="et-card" style="overflow:hidden">
      <div class="et-table-wrap">
        <table class="et-table" id="usersTable">
          <thead><tr>
            <th>User</th><th>Email</th><th>Joined</th><th>Roles</th><th>Actions</th>
          </tr></thead>
          <tbody id="usersTbody">${renderRows(users)}</tbody>
        </table>
      </div>
    </div>`;
}

function renderRows(list){
  if(!list.length)return`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--white3)">No users found.</td></tr>`;
  return list.map(u=>{
    const isAdmin=u.is_admin===true;
    const isMentor=u.is_mentor===true;
    const isSelf=u.id===_user.id;
    const name=u.full_name||u.email?.split('@')[0]||'—';
    const ini=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    return`<tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);flex-shrink:0">${ini}</div>
          <div style="font-size:13px;font-weight:500;color:var(--white)">${name}${isSelf?' <span style="font-family:\'DM Mono\',monospace;font-size:8px;color:var(--gold);padding:1px 5px;border:1px solid var(--gold-border);border-radius:100px">You</span>':''}</div>
        </div>
      </td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--white2)">${u.email||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3)">${u.created_at?new Date(u.created_at).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'}):'—'}</td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${isAdmin?'<span style="font-family:\'DM Mono\',monospace;font-size:8px;padding:2px 8px;background:rgba(200,169,110,0.12);border:1px solid rgba(200,169,110,0.25);color:var(--gold);border-radius:100px;letter-spacing:0.06em">ADMIN</span>':''}
          ${isMentor?'<span style="font-family:\'DM Mono\',monospace;font-size:8px;padding:2px 8px;background:rgba(74,158,255,0.12);border:1px solid rgba(74,158,255,0.25);color:#6ba3ff;border-radius:100px;letter-spacing:0.06em">MENTOR</span>':''}
          ${!isAdmin&&!isMentor?'<span style="font-family:\'DM Mono\',monospace;font-size:8px;color:var(--white3)">User</span>':''}
        </div>
      </td>
      <td>
        <button onclick="openRoleModal('${u.id}','${name.replace(/'/g,"\\'")}','${u.email||''}',${isAdmin},${isMentor})" class="et-btn-ghost" style="padding:5px 10px;font-size:11px">Manage Roles</button>
      </td>
    </tr>`;
  }).join('');
}

function filterUsers(){
  const q=document.getElementById('userSearch').value.toLowerCase();
  const filtered=users.filter(u=>(u.full_name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q));
  document.getElementById('usersTbody').innerHTML=renderRows(filtered);
}

function openRoleModal(id,name,email,isAdmin,isMentor){
  document.getElementById('rUserId').value=id;
  document.getElementById('rModalName').textContent=name;
  document.getElementById('rModalEmail').textContent=email;
  document.getElementById('rIsAdmin').checked=isAdmin;
  document.getElementById('rIsMentor').checked=isMentor;
  document.getElementById('rAlert').style.display='none';
  etOpenModal('roleModal');
}

async function saveRoles(){
  const id=document.getElementById('rUserId').value;
  const isAdmin=document.getElementById('rIsAdmin').checked;
  const isMentor=document.getElementById('rIsMentor').checked;
  const isSelf=id===_user.id;

  if(isSelf&&!isAdmin){
    const al=document.getElementById('rAlert');
    al.textContent="⚠️ You can't remove your own admin role.";
    al.style.display='block';
    return;
  }

  // Update via profiles table
  const{error}=await _sb.from('profiles').update({is_admin:isAdmin,is_mentor:isMentor}).eq('id',id);
  if(error){
    const al=document.getElementById('rAlert');
    al.textContent=error.message;al.style.display='block';
    return;
  }

  etCloseModal('roleModal');
  await loadUsers();
}

document.addEventListener('click',e=>{if(e.target.classList.contains('et-modal-overlay'))etCloseModal(e.target.id);});
main();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="hub-sidebar.js" onload="main()"></script>
</body>
</html>
