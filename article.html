<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.art-page-wrap{max-width:1200px;margin:0 auto;padding:80px 24px 100px;display:grid;grid-template-columns:160px 1fr 260px;gap:32px;align-items:start}
.art-left-col{position:sticky;top:90px}
.art-main-col{}
.art-right-col{position:sticky;top:90px;display:flex;flex-direction:column;gap:16px}
.art-back{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:#7a7570;text-decoration:none;letter-spacing:0.05em;margin-bottom:28px;transition:color 0.2s;white-space:nowrap}
.art-back:hover{color:var(--gold)}
.art-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 10px;border-radius:100px;display:inline-flex;margin-bottom:14px}
.art-tag.technical{background:rgba(74,158,255,0.12);color:#6ba3ff;border:1px solid rgba(74,158,255,0.2)}
.art-tag.fundamental{background:rgba(200,169,110,0.1);color:var(--gold);border:1px solid rgba(200,169,110,0.2)}
.art-tag.market{background:rgba(76,175,125,0.12);color:#4caf7d;border:1px solid rgba(76,175,125,0.2)}
.art-tag.default{background:rgba(255,255,255,0.05);color:#a09880;border:1px solid rgba(255,255,255,0.08)}
.art-h1{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,46px);font-weight:900;line-height:1.08;color:#fff;margin-bottom:14px;letter-spacing:-0.01em}
.art-excerpt{font-size:17px;color:#a09880;line-height:1.7;margin-bottom:20px}
/* Meta row */
.art-meta{display:flex;align-items:center;gap:16px;padding:14px 0;border-top:1px solid rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:24px;flex-wrap:wrap}
.art-meta-item{font-family:'DM Mono',monospace;font-size:11px;color:#7a7570;display:flex;align-items:center;gap:5px}
.art-author{display:flex;align-items:center;gap:8px}
.art-author-av{width:26px;height:26px;border-radius:50%;background:rgba(200,169,110,0.12);border:1px solid rgba(200,169,110,0.2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);font-weight:500}
.art-author-name{font-size:12px;font-weight:500;color:#c8c4bc}
/* Keynotes */
.art-keynotes{background:rgba(200,169,110,0.05);border:1px solid rgba(200,169,110,0.15);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:18px 20px;margin-bottom:28px}
.art-keynotes-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.art-keynotes ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px}
.art-keynotes li{font-size:14px;color:#c8c4bc;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
.art-keynotes li::before{content:'→';color:var(--gold);font-family:'DM Mono',monospace;font-size:11px;margin-top:2px;flex-shrink:0}
/* Cover */
.art-cover{width:100%;height:340px;background:linear-gradient(135deg,#0c0e13,#161b24);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:32px;border:1px solid rgba(255,255,255,0.06)}
.art-cover img{width:100%;height:100%;object-fit:cover}
/* Content */
.art-content{color:#c8c4bc;font-size:16px;line-height:1.9}
.art-content h2{font-family:'Playfair Display',serif;font-size:25px;font-weight:700;color:#fff;margin:36px 0 14px;line-height:1.2}
.art-content h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;margin:28px 0 10px}
.art-content p{margin-bottom:18px}
.art-content strong{color:#fff;font-weight:600}
.art-content em{color:var(--gold);font-style:italic}
.art-content ul,.art-content ol{padding-left:22px;margin-bottom:18px}
.art-content li{margin-bottom:7px;line-height:1.7}
.art-content blockquote{border-left:3px solid var(--gold);padding:12px 18px;margin:22px 0;background:rgba(200,169,110,0.06);border-radius:0 4px 4px 0;font-style:italic;color:#a09880}
.art-content img{max-width:100%;border-radius:4px;margin:22px 0;border:1px solid rgba(255,255,255,0.06);display:block}
.art-content hr{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:36px 0}
.art-content a{color:var(--gold);text-decoration:underline;text-underline-offset:3px}
.art-content .cb{padding:14px 18px;border-radius:0 4px 4px 0;margin:22px 0;font-size:15px;line-height:1.75}
.art-content .cb-bull{border-left:3px solid #4caf7d;background:rgba(76,175,125,0.07)}
.art-content .cb-bear{border-left:3px solid #e05c5c;background:rgba(224,92,92,0.07)}
.art-content .cb-note{border-left:3px solid var(--gold);background:rgba(200,169,110,0.07)}
.art-content .img-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
.art-content .img-split img{margin:0}
/* Sidebar widgets */
.sw{background:#0c0e13;border:1px solid rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.sw-hdr{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.06);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold)}
.sw-body{padding:14px}
.sw-text{font-size:13px;color:#a09880;line-height:1.7}
.sw-cta-btn{display:block;width:100%;margin-top:12px;padding:9px;background:var(--gold);border:none;color:#08090c;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:3px;text-align:center;text-decoration:none;transition:background 0.2s}
.sw-cta-btn:hover{background:#e8cc94}
.sw-img{width:100%;display:block}
.sw-ad{width:100%;min-height:140px;background:linear-gradient(135deg,rgba(200,169,110,0.06),rgba(200,169,110,0.02));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:#5a5648;letter-spacing:0.1em;text-transform:uppercase;border:1px dashed rgba(200,169,110,0.12);border-radius:4px;padding:20px;text-align:center}
/* Nav between articles */
.art-nav{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:52px;padding-top:36px;border-top:1px solid rgba(255,255,255,0.06)}
.art-nav-item{background:#0c0e13;border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:14px;text-decoration:none;transition:border-color 0.2s;display:block}
.art-nav-item:hover{border-color:rgba(200,169,110,0.25)}
.art-nav-lbl{font-family:'DM Mono',monospace;font-size:9px;color:#5a5648;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px}
.art-nav-ttl{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#c8c4bc;line-height:1.3}
.art-nav-item.right{text-align:right}
/* Left ad column */
.art-ad-wrap{display:flex;flex-direction:column;gap:14px;align-items:flex-end}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(200,169,110,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.art-page-wrap{grid-template-columns:1fr 260px}}
@media(max-width:860px){.art-page-wrap{grid-template-columns:1fr;padding:60px 16px 80px}.art-right-col,.art-left-col{position:relative;top:auto}.art-left-col{display:none}}
@media(max-width:600px){.art-content .img-split{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="navMount"></div>
<div id="articlePageWrap">
  <div style="text-align:center;padding:120px 24px">
    <div class="spinner"></div>
    <div style="margin-top:14px;font-size:13px;color:#5a5648">Loading article...</div>
  </div>
</div>
<footer>
  <div class="footer-logo">Eagle<span>Pips</span></div>
  <ul class="footer-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="market-updates.html">Market Updates</a></li>
    <li><a href="tools.html">Tools</a></li>
  </ul>
  <div class="footer-copy">© 2026 EaglePips. All rights reserved.</div>
</footer>

<script>
const SB_URL='https://vaimxhgqcdhjhdiaampa.supabase.co';
const SB_KEY='sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';

function tagClass(cat){
  if(!cat)return'default';const c=cat.toLowerCase();
  if(c.includes('technical'))return'technical';
  if(c.includes('fundamental'))return'fundamental';
  if(c.includes('market'))return'market';
  return'default';
}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtDateShort(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});}

function parseContent(c){
  if(!c)return'';
  return c
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\[SPLIT\]([\s\S]+?)\[\/SPLIT\]/g,'<div class="img-split">$1</div>')
    .replace(/\[BULL\]([\s\S]+?)\[\/BULL\]/g,'<div class="cb cb-bull">$1</div>')
    .replace(/\[BEAR\]([\s\S]+?)\[\/BEAR\]/g,'<div class="cb cb-bear">$1</div>')
    .replace(/\[NOTE\]([\s\S]+?)\[\/NOTE\]/g,'<div class="cb cb-note">$1</div>')
    .split('\n\n').map(b=>{b=b.trim();if(!b||b.startsWith('<'))return b;return'<p>'+b.replace(/\n/g,'<br>')+'</p>';}).join('');
}

function renderSidebarWidget(w){
  const body=`<div class="sw-body">
    ${w.type==='ad'?
      (w.image_url?`<a href="${w.link_url||'#'}" target="_blank"><img src="${w.image_url}" class="sw-img" alt="${w.title||'Ad'}"></a>`:
      `<div class="sw-ad"><span>📢</span><span>Advertisement</span>${w.link_url?`<a href="${w.link_url}" target="_blank" style="color:var(--gold);font-size:10px;text-decoration:none">${w.link_label||'Visit'}</a>`:''}</div>`)
    :w.type==='image'?
      (w.image_url?`<img src="${w.image_url}" class="sw-img" alt="${w.title||''}">`:'')+
      (w.content?`<div class="sw-text" style="margin-top:10px">${w.content}</div>`:'')
    :`<div class="sw-text">${w.content||''}</div>
     ${w.link_url?`<a href="${w.link_url}" class="sw-cta-btn" target="_blank">${w.link_label||'Learn More'}</a>`:''}`}
  </div>`;
  return`<div class="sw">${w.title?`<div class="sw-hdr">${w.title}</div>`:''} ${body}</div>`;
}

async function initPage(){
  // renderNav defined inline below
  renderNav('updates');
  const slug=new URLSearchParams(window.location.search).get('slug');
  if(!slug){window.location.href='market-updates.html';return;}
  const _sb=window.supabase.createClient(SB_URL,SB_KEY);

  const[artRes,widRes]=await Promise.all([
    _sb.from('articles').select('*').eq('slug',slug).eq('published',true).single(),
    _sb.from('sidebar_widgets').select('*').eq('active',true).order('sort_order',{ascending:true})
  ]);

  const article=artRes.data;
  const widgets=widRes.data||[];

  if(!article){
    document.getElementById('articlePageWrap').innerHTML=`
      <div style="max-width:760px;margin:0 auto;padding:80px 24px;text-align:center">
        <a href="market-updates.html" class="art-back">← Back to Market Updates</a>
        <div style="font-size:40px;opacity:0.15;margin:20px 0 14px">📄</div>
        <div style="font-family:'Playfair Display',serif;font-size:24px;color:#fff;margin-bottom:8px">Article not found</div>
        <a href="market-updates.html" style="color:var(--gold);font-size:13px">← Back to Market Updates</a>
      </div>`;
    return;
  }

  document.title=`EaglePips — ${article.title}`;

  // Fetch adjacent articles
  const{data:all}=await _sb.from('articles').select('id,title,slug,published_at').eq('published',true).order('published_at',{ascending:false});
  const idx=all?.findIndex(a=>a.slug===slug)??-1;
  const prevArt=idx>0?all[idx-1]:null;
  const nextArt=idx<(all?.length-1)?all[idx+1]:null;

  const rightWidgets=widgets.filter(w=>w.position==='right');
  const leftWidgets=widgets.filter(w=>w.position==='left');

  const authorIni=(article.author_name||'E').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const pubDate=fmtDate(article.published_at||article.created_at);
  const pubDateShort=fmtDateShort(article.published_at||article.created_at);

  const coverHtml=article.cover_url
    ?`<img src="${article.cover_url}" alt="${article.title}" onerror="this.style.display='none'">`
    :`📊`;

  const keynotesHtml=article.keynotes?.length?`
    <div class="art-keynotes">
      <div class="art-keynotes-title">Key Points</div>
      <ul>${article.keynotes.map(k=>`<li>${k}</li>`).join('')}</ul>
    </div>`:'';

  const leftColHtml=leftWidgets.length?leftWidgets.map(renderSidebarWidget).join(''):`
    <div class="sw-ad"><span>📢</span><span>Ad Space</span><span style="font-size:9px;margin-top:4px">Contact us to advertise</span></div>`;

  const rightColHtml=rightWidgets.length?rightWidgets.map(renderSidebarWidget).join(''):`
    <div class="sw"><div class="sw-hdr">About EaglePips</div><div class="sw-body"><div class="sw-text">Professional trading analysis — technical and fundamental insights updated regularly.</div><a href="auth.html?tab=register" class="sw-cta-btn">Get Access →</a></div></div>`;

  document.getElementById('articlePageWrap').innerHTML=`
    <div class="art-page-wrap">

      <!-- Left col (ads) -->
      <div class="art-left-col">
        <div class="art-ad-wrap">${leftColHtml}</div>
      </div>

      <!-- Main content -->
      <div class="art-main-col">
        <a href="market-updates.html" class="art-back">← Market Updates</a>

        <div class="art-header">
          <span class="art-tag ${tagClass(article.category)}">${article.category||'Market Update'}</span>
          <h1 class="art-h1">${article.title}</h1>
          ${article.excerpt?`<p class="art-excerpt">${article.excerpt}</p>`:''}

          <!-- Published date + author -->
          <div class="art-meta">
            <div class="art-meta-item">📅 Published ${pubDate}</div>
            <div class="art-author">
              <div class="art-author-av">${authorIni}</div>
              <div class="art-author-name">${article.author_name||'EaglePips'}</div>
            </div>
            ${article.tags?.length?`<div class="art-meta-item">🏷 ${article.tags.join(' · ')}</div>`:''}
          </div>
        </div>

        <!-- Keynotes -->
        ${keynotesHtml}

        <!-- Cover -->
        ${article.cover_url?`<div class="art-cover">${coverHtml}</div>`:''}

        <!-- Content -->
        <div class="art-content">${parseContent(article.content)}</div>

        <!-- Article nav -->
        ${(prevArt||nextArt)?`
        <div class="art-nav">
          ${nextArt?`<a href="article.html?slug=${nextArt.slug}" class="art-nav-item"><div class="art-nav-lbl">← Previous Article</div><div class="art-nav-ttl">${nextArt.title}</div></a>`:'<div></div>'}
          ${prevArt?`<a href="article.html?slug=${prevArt.slug}" class="art-nav-item right"><div class="art-nav-lbl">Next Article →</div><div class="art-nav-ttl">${prevArt.title}</div></a>`:'<div></div>'}
        </div>`:''}
      </div>

      <!-- Right sidebar -->
      <div class="art-right-col">${rightColHtml}</div>

    </div>`;
}
</script>
<script>
</script>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="window._sbReady=true;if(window._navReady)initPage()"></script>
</body>
</html>
