<style>
.article-page { max-width: 760px; margin: 0 auto; padding: 80px 24px 100px; }
.article-back {
  display: inline-flex; align-items: center; gap: 6px;

  color: #7a7570; text-decoration: none; letter-spacing: 0.05em;

}
.article-back:hover { color: var(--gold); }
.article-header { margin-bottom: 32px; }
.article-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 100px;
  display: inline-flex; margin-bottom: 16px;

.article-tag.technical   { background: rgba(74,158,255,0.12); color: #6ba3ff; border: 1px solid rgba(74,158,255,0.2); }

}
.article-meta-item {

.article-cover {

/* Article content typography */
.article-content { color: #c8c4bc; font-size: 16px; line-height: 1.85; }
.article-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700; color: #ffffff;
  margin: 40px 0 16px; line-height: 1.2;
}
.article-content h3 {
  font-family: 'Playfair Display', serif;

}
.article-content p { margin-bottom: 20px; }
.article-content strong { color: #ffffff; font-weight: 600; }

.article-content ul, .article-content ol {
  padding-left: 24px; margin-bottom: 20px;
}
.article-content li { margin-bottom: 8px; }
.article-content blockquote {
  border-left: 3px solid var(--gold);
  padding: 12px 20px; margin: 24px 0;
  background: rgba(200,169,110,0.06);
  border-radius: 0 4px 4px 0;
  font-style: italic; color: #a09880;
}
.article-content img {
  width: 100%; border-radius: 4px; margin: 24px 0;
  border: 1px solid rgba(255,255,255,0.06);
}
.article-content hr {
  border: none; border-top: 1px solid rgba(255,255,255,0.06);

.article-content a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }

  font-family: 'DM Mono', monospace; font-size: 13px;
  background: rgba(255,255,255,0.06); padding: 2px 6px;
  border-radius: 3px; color: #c8c4bc;

.article-content pre {
  background: #0c0e13; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; padding: 16px; overflow-x: auto;
  margin-bottom: 20px;
}

/* Callout boxes */
.article-content .callout {

/* Bottom nav */

  border-top: 1px solid rgba(255,255,255,0.06);

<script>
const SB_URL = 'https://vaimxhgqcdhjhdiaampa.supabase.co';
const SB_KEY = 'sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';

function tagClass(cat) {
  if (!cat) return 'default';
  const c = cat.toLowerCase();
  if (c.includes('technical'))   return 'technical';
  if (c.includes('fundamental')) return 'fundamental';
  if (c.includes('market'))      return 'market';
  return 'default';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// Convert markdown-like content to HTML
function parseContent(content) {
  if (!content) return '';
  let html = content
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Horizontal rule
    .replace(/^---$/gm, '<hr>')
    // Blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Unordered list
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    // Links
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    // Callouts
    .replace(/\[BULL\]([\s\S]+?)\[\/BULL\]/g, '<div class="callout callout-bull">$1</div>')
    .replace(/\[BEAR\]([\s\S]+?)\[\/BEAR\]/g, '<div class="callout callout-bear">$1</div>')
    .replace(/\[NOTE\]([\s\S]+?)\[\/NOTE\]/g, '<div class="callout">$1</div>')
    // Paragraphs - wrap lines that aren't already in tags
    .split('\n\n')
    .map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<blockquote') || block.startsWith('<hr') || block.startsWith('<div')) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    })
    .join('');
  return html;
}

async function adminDelete(id) {
  if (!confirm('Delete this article permanently?')) return;
  const _sb = window.supabase.createClient(SB_URL, SB_KEY);
  await _sb.from('articles').delete().eq('id', id);
  window.location.href = 'market-updates.html';
}

async function initPage() {
  // Update nav auth state
  try {
    const _sbNav = window.supabase.createClient('https://vaimxhgqcdhjhdiaampa.supabase.co','sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH');
    const { data: { session } } = await _sbNav.auth.getSession();
    if (session?.user) {
      const u = session.user;
      const name = u.user_metadata?.full_name || u.email?.split('@')[0] || 'Trader';
      const ini = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      const av = localStorage.getItem('et_av_'+u.id);
      const avHtml = av ? `<img src="${av}" style="width:24px;height:24px;border-radius:50%;object-fit:cover">` : `<span style="font-family:'DM Mono',monospace;font-size:10px;color:#c8a96e">${ini}</span>`;
      const isAdmin = u.user_metadata?.is_admin === true;
      const cta = document.getElementById('navCta');
      if (cta) cta.innerHTML = `
        <a href="hub.html" style="padding:7px 16px;border:1px solid rgba(200,169,110,0.2);color:#a09880;font-size:12px;text-decoration:none;border-radius:3px;display:inline-flex;align-items:center;gap:7px">
          <div style="width:24px;height:24px;border-radius:50%;background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden">${avHtml}</div>
          My Hub
        </a>
        ${isAdmin ? '<a href="admin-articles.html" style="padding:7px 12px;border:1px solid rgba(200,169,110,0.2);color:#a09880;font-size:11px;text-decoration:none;border-radius:3px">⚙️ Admin</a>' : ''}
        <button onclick="(async()=>{await window.supabase.createClient('https://vaimxhgqcdhjhdiaampa.supabase.co','sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH').auth.signOut();window.location.reload()})()" style="padding:7px 14px;background:#c8a96e;border:1px solid #c8a96e;color:#08090c;font-size:12px;font-weight:700;border-radius:3px;cursor:pointer">Sign Out</button>`;
    }
  } catch(e) {}
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { window.location.href = 'market-updates.html'; return; }

  const _sb = window.supabase.createClient(SB_URL, SB_KEY);
  const { data: article, error } = await _sb
    .from('articles')
    .select('*')
    .eq('slug', slug)
    .eq('published', true)
    .single();

  if (error || !article) {
    document.getElementById('articlePage').innerHTML = `
      <a href="market-updates.html" class="article-back">← Back to Market Updates</a>
      <div style="text-align:center;padding:60px;color:#7a7570">
        <div style="font-size:40px;opacity:0.2;margin-bottom:14px">📄</div>
        <div style="font-size:18px;color:#c8c4bc;margin-bottom:8px">Article not found</div>
        <a href="market-updates.html" style="color:var(--gold);font-size:13px">← Back to Market Updates</a>
      </div>`;
    return;
  }

  // Update page title
  document.title = `EaglePips — ${article.title}`;

  // Check if admin
  const { data: { session } } = await _sb.auth.getSession();
  const isAdmin = session?.user?.user_metadata?.is_admin === true;

  // Fetch adjacent articles
  const { data: allArticles } = await _sb
    .from('articles').select('id,title,slug,published_at')
    .eq('published', true).order('published_at', { ascending: false });

  const idx = allArticles?.findIndex(a => a.slug === slug) ?? -1;
  const prev = idx > 0 ? allArticles[idx - 1] : null;
  const next = idx < (allArticles?.length - 1) ? allArticles[idx + 1] : null;

  const coverHtml = article.cover_url
    ? `<img src="${article.cover_url}" alt="${article.title}" onerror="this.style.display='none'">`
    : `📊`;

  document.getElementById('articlePage').innerHTML = `
    <a href="market-updates.html" class="article-back">← Back to Market Updates</a>
    ${isAdmin ? `<div style="background:rgba(200,169,110,0.08);border:1px solid rgba(200,169,110,0.2);border-radius:4px;padding:10px 16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:0.08em">⚙️ ADMIN</span>
      <div style="display:flex;gap:8px">
        <a href="admin-articles.html" onclick="localStorage.setItem('ep_edit_slug','${article.slug}')" style="padding:5px 12px;background:transparent;border:1px solid rgba(200,169,110,0.3);color:var(--gold);font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;border-radius:3px;text-decoration:none">✏️ Edit</a>
        <button onclick="adminDelete('${article.id}')" style="padding:5px 12px;background:transparent;border:1px solid rgba(224,92,92,0.3);color:#e05c5c;font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;border-radius:3px">🗑 Delete</button>
      </div>
    </div>` : ''}
    <div class="article-header">
      <span class="article-tag ${tagClass(article.category)}">${article.category || 'Market Update'}</span>
      <h1 class="article-h1">${article.title}</h1>
      ${article.excerpt ? `<p style="font-size:17px;color:#a09880;line-height:1.7;margin-bottom:16px">${article.excerpt}</p>` : ''}
      <div class="article-meta-row">
        <div class="article-meta-item">📅 ${fmtDate(article.published_at || article.created_at)}</div>
        ${article.tags?.length ? `<div class="article-meta-item">🏷 ${article.tags.join(', ')}</div>` : ''}
      </div>
    </div>
    ${article.cover_url ? `<div class="article-cover">${coverHtml}</div>` : ''}
    <div class="article-content">${parseContent(article.content)}</div>
    ${(prev || next) ? `
    <div class="article-nav">
      ${next ? `<a href="article.html?slug=${next.slug}" class="article-nav-item"><div class="article-nav-label">← Previous</div><div class="article-nav-title">${next.title}</div></a>` : '<div></div>'}
      ${prev ? `<a href="article.html?slug=${prev.slug}" class="article-nav-item next"><div class="article-nav-label">Next →</div><div class="article-nav-title">${prev.title}</div></a>` : '<div></div>'}
    </div>` : ''}
  `;
}
</script>
<script>
const _NAV_URL = 'https://vaimxhgqcdhjhdiaampa.supabase.co';
const _NAV_KEY = 'sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';

function renderNav(activePage) {
  const pages = [
    { id: 'index',   label: 'Home',          href: 'index.html' },
    { id: 'updates', label: 'Market Updates', href: 'market-updates.html' },
    { id: 'journal', label: 'Journal',        href: 'journal.html' },
    { id: 'tools',   label: 'Tools',          href: 'tools.html' },
  ];
  const links = pages.map(p =>
    `<li><a href="${p.href}" class="nav-link ${activePage===p.id?'active':''}">${p.label}</a></li>`
  ).join('');

  document.getElementById('navMount').innerHTML = `
    <nav>
      <a href="index.html" class="nav-logo">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,#c8a96e,#8a6a32);clip-path:polygon(50% 0%,85% 15%,100% 50%,85% 85%,50% 100%,15% 85%,0% 50%,15% 15%);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">🦅</div>
        Eagle<span>Pips</span>
      </a>
      <ul class="nav-links">${links}</ul>
      <div class="nav-cta" id="navCta">
        <a href="auth.html" class="btn-ghost">Sign In</a>
        <a href="auth.html?tab=register" class="btn-gold">Get Access →</a>
      </div>
      <button class="nav-burger" onclick="toggleMobileNav()" id="burger">☰</button>
    </nav>
    <div class="mobile-nav" id="mobileNav">
      ${pages.map(p=>`<a href="${p.href}" class="${activePage===p.id?'active':''}">${p.label}</a>`).join('')}
      <a href="auth.html?tab=register" style="color:var(--gold)" id="mobileAuthLink">Get Access →</a>
    </div>`;

  // Wait for Supabase to be ready then check auth
  waitForSupabase(checkNavAuthState);
}

function toggleMobileNav() {
  document.getElementById('mobileNav')?.classList.toggle('open');
}

// Retry until window.supabase is available (CDN might still be loading)
function waitForSupabase(callback, attempts=0) {
  if (window.supabase && window.supabase.createClient) {
    callback();
  } else if (attempts < 20) {
    setTimeout(() => waitForSupabase(callback, attempts + 1), 100);
  }
}

async function checkNavAuthState() {
  try {
    const _sb = window.supabase.createClient(_NAV_URL, _NAV_KEY);
    const { data: { session } } = await _sb.auth.getSession();
    if (!session?.user) return;

    const user = session.user;
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Trader';
    const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);

    // Check both avatar key variants
    const savedAvatar = localStorage.getItem('et_av_'+user.id) || localStorage.getItem('fe_avatar_'+user.id);
    const avatarHtml = savedAvatar
      ? `<img src="${savedAvatar}" style="width:26px;height:26px;border-radius:50%;object-fit:cover">`
      : `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gold)">${initials}</span>`;

    const isAdmin = user.user_metadata?.is_admin === true;
    const ctaEl = document.getElementById('navCta');
    if (ctaEl) {
      ctaEl.innerHTML = `
        <a href="hub.html" class="btn-ghost" style="display:inline-flex;align-items:center;gap:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">${avatarHtml}</div>
          My Hub
        </a>
        ${isAdmin ? '<a href="admin-articles.html" class="btn-ghost" style="font-size:11px;padding:6px 12px">⚙️ Admin</a>' : ''}
        <button class="btn-gold" onclick="navSignOut()">Sign Out</button>`;
    }
    const ml = document.getElementById('mobileAuthLink');
    if (ml) { ml.href='hub.html'; ml.textContent='My Hub →'; }
  } catch(e) {
    console.warn('Nav auth check failed:', e);
  }
}

async function navSignOut() {
  try {
    const _sb = window.supabase.createClient(_NAV_URL, _NAV_KEY);
    await _sb.auth.signOut();
  } catch(e) {}
  window.location.href = 'index.html';
}

function openModal(view) { window.location.href = view==='register' ? 'auth.html?tab=register' : 'auth.html'; }
function closeModal(){} function switchModal(){} function renderModal(){} function updateNavAuth(){}

window._navReady = true;
if (window._sbReady) initPage();
</script>
