<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.article-page { max-width: 760px; margin: 0 auto; padding: 80px 24px 100px; }
.article-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #7a7570; text-decoration: none; letter-spacing: 0.05em;
  margin-bottom: 40px; transition: color 0.2s;
}
.article-back:hover { color: var(--gold); }
.article-header { margin-bottom: 32px; }
.article-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 100px;
  display: inline-flex; margin-bottom: 16px;
}
.article-tag.technical   { background: rgba(74,158,255,0.12); color: #6ba3ff; border: 1px solid rgba(74,158,255,0.2); }
.article-tag.fundamental { background: rgba(200,169,110,0.1); color: var(--gold); border: 1px solid rgba(200,169,110,0.2); }
.article-tag.market      { background: rgba(76,175,125,0.12); color: #4caf7d; border: 1px solid rgba(76,175,125,0.2); }
.article-tag.default     { background: rgba(255,255,255,0.05); color: #a09880; border: 1px solid rgba(255,255,255,0.08); }
.article-h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 900; line-height: 1.1;
  color: #ffffff; margin-bottom: 16px;
  letter-spacing: -0.01em;
}
.article-meta-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 32px;
}
.article-meta-item {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: #7a7570;
  display: flex; align-items: center; gap: 5px;
}
.article-cover {
  width: 100%; height: 360px;
  background: linear-gradient(135deg, #0c0e13, #161b24);
  border-radius: 4px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; margin-bottom: 40px;
  border: 1px solid rgba(255,255,255,0.06);
}
.article-cover img { width: 100%; height: 100%; object-fit: cover; }

/* Article content typography */
.article-content { color: #c8c4bc; font-size: 16px; line-height: 1.85; }
.article-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700; color: #ffffff;
  margin: 40px 0 16px; line-height: 1.2;
}
.article-content h3 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; color: #ffffff;
  margin: 32px 0 12px;
}
.article-content p { margin-bottom: 20px; }
.article-content strong { color: #ffffff; font-weight: 600; }
.article-content em { color: var(--gold); font-style: italic; }
.article-content ul, .article-content ol {
  padding-left: 24px; margin-bottom: 20px;
}
.article-content li { margin-bottom: 8px; }
.article-content blockquote {
  border-left: 3px solid var(--gold);
  padding: 12px 20px; margin: 24px 0;
  background: rgba(200,169,110,0.06);
  border-radius: 0 4px 4px 0;
  font-style: italic; color: #a09880;
}
.article-content img {
  width: 100%; border-radius: 4px; margin: 24px 0;
  border: 1px solid rgba(255,255,255,0.06);
}
.article-content hr {
  border: none; border-top: 1px solid rgba(255,255,255,0.06);
  margin: 40px 0;
}
.article-content a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }
.article-content code {
  font-family: 'DM Mono', monospace; font-size: 13px;
  background: rgba(255,255,255,0.06); padding: 2px 6px;
  border-radius: 3px; color: #c8c4bc;
}
.article-content pre {
  background: #0c0e13; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; padding: 16px; overflow-x: auto;
  margin-bottom: 20px;
}
.article-content pre code { background: none; padding: 0; }

/* Callout boxes */
.article-content .callout {
  padding: 14px 18px; border-radius: 4px; margin: 24px 0;
  border-left: 3px solid var(--gold);
  background: rgba(200,169,110,0.06);
}
.article-content .callout-bull {
  border-left-color: #4caf7d;
  background: rgba(76,175,125,0.06);
}
.article-content .callout-bear {
  border-left-color: #e05c5c;
  background: rgba(224,92,92,0.06);
}

/* Bottom nav */
.article-nav {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 60px; padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.article-nav-item {
  background: #0c0e13; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; padding: 16px; text-decoration: none;
  transition: border-color 0.2s; display: block;
}
.article-nav-item:hover { border-color: rgba(200,169,110,0.25); }
.article-nav-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: #5a5648; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 6px;
}
.article-nav-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-weight: 700; color: #c8c4bc; line-height: 1.3;
}
.article-nav-item.next { text-align: right; }

.loading-center { text-align: center; padding: 80px; color: #5a5648; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(200,169,110,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="navMount"></div>

<div class="article-page" id="articlePage">
  <div class="loading-center">
    <div class="spinner"></div>
    <div style="margin-top:12px;font-size:13px">Loading article...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">Eagle<span>Pips</span></div>
  <ul class="footer-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="market-updates.html">Market Updates</a></li>
    <li><a href="tools.html">Tools</a></li>
  </ul>
  <div class="footer-copy">© 2026 EaglePips. All rights reserved.</div>
</footer>

<script>

</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="initPage()"></script>
<script src="nav.js"></script>
<script>
const SB_URL = 'https://vaimxhgqcdhjhdiaampa.supabase.co';
const SB_KEY = 'sb_publishable_CebHZhFOubWHVcC-DaGV8w_LsMUCVNH';

function tagClass(cat) {
  if (!cat) return 'default';
  const c = cat.toLowerCase();
  if (c.includes('technical'))   return 'technical';
  if (c.includes('fundamental')) return 'fundamental';
  if (c.includes('market'))      return 'market';
  return 'default';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// Convert markdown-like content to HTML
function parseContent(content) {
  if (!content) return '';
  let html = content
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Horizontal rule
    .replace(/^---$/gm, '<hr>')
    // Blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Unordered list
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    // Links
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    // Callouts
    .replace(/\[BULL\]([\s\S]+?)\[\/BULL\]/g, '<div class="callout callout-bull">$1</div>')
    .replace(/\[BEAR\]([\s\S]+?)\[\/BEAR\]/g, '<div class="callout callout-bear">$1</div>')
    .replace(/\[NOTE\]([\s\S]+?)\[\/NOTE\]/g, '<div class="callout">$1</div>')
    // Paragraphs - wrap lines that aren't already in tags
    .split('\n\n')
    .map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<blockquote') || block.startsWith('<hr') || block.startsWith('<div')) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    })
    .join('');
  return html;
}

async function initPage() {
  renderNav('updates');
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { window.location.href = 'market-updates.html'; return; }

  const _sb = window.supabase.createClient(SB_URL, SB_KEY);
  const { data: article, error } = await _sb
    .from('articles')
    .select('*')
    .eq('slug', slug)
    .eq('published', true)
    .single();

  if (error || !article) {
    document.getElementById('articlePage').innerHTML = `
      <a href="market-updates.html" class="article-back">← Back to Market Updates</a>
      <div style="text-align:center;padding:60px;color:#7a7570">
        <div style="font-size:40px;opacity:0.2;margin-bottom:14px">📄</div>
        <div style="font-size:18px;color:#c8c4bc;margin-bottom:8px">Article not found</div>
        <a href="market-updates.html" style="color:var(--gold);font-size:13px">← Back to Market Updates</a>
      </div>`;
    return;
  }

  // Update page title
  document.title = `EaglePips — ${article.title}`;

  // Fetch adjacent articles
  const { data: allArticles } = await _sb
    .from('articles').select('id,title,slug,published_at')
    .eq('published', true).order('published_at', { ascending: false });

  const idx = allArticles?.findIndex(a => a.slug === slug) ?? -1;
  const prev = idx > 0 ? allArticles[idx - 1] : null;
  const next = idx < (allArticles?.length - 1) ? allArticles[idx + 1] : null;

  const coverHtml = article.cover_url
    ? `<img src="${article.cover_url}" alt="${article.title}" onerror="this.style.display='none'">`
    : `📊`;

  document.getElementById('articlePage').innerHTML = `
    <a href="market-updates.html" class="article-back">← Back to Market Updates</a>
    <div class="article-header">
      <span class="article-tag ${tagClass(article.category)}">${article.category || 'Market Update'}</span>
      <h1 class="article-h1">${article.title}</h1>
      ${article.excerpt ? `<p style="font-size:17px;color:#a09880;line-height:1.7;margin-bottom:16px">${article.excerpt}</p>` : ''}
      <div class="article-meta-row">
        <div class="article-meta-item">📅 ${fmtDate(article.published_at || article.created_at)}</div>
        ${article.tags?.length ? `<div class="article-meta-item">🏷 ${article.tags.join(', ')}</div>` : ''}
      </div>
    </div>
    ${article.cover_url ? `<div class="article-cover">${coverHtml}</div>` : ''}
    <div class="article-content">${parseContent(article.content)}</div>
    ${(prev || next) ? `
    <div class="article-nav">
      ${next ? `<a href="article.html?slug=${next.slug}" class="article-nav-item"><div class="article-nav-label">← Previous</div><div class="article-nav-title">${next.title}</div></a>` : '<div></div>'}
      ${prev ? `<a href="article.html?slug=${prev.slug}" class="article-nav-item next"><div class="article-nav-label">Next →</div><div class="article-nav-title">${prev.title}</div></a>` : '<div></div>'}
    </div>` : ''}
  `;
}
</script>
