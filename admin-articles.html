<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Articles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
<style>
/* ─ Global readability fixes ─ */
.et-form-label{color:var(--white2)!important;font-size:10px!important}
.et-form-input{font-size:13px!important;color:var(--white)!important;background:var(--bg3)!important;border-color:var(--border)!important}
.et-form-input:focus{border-color:var(--gold-border)!important}
.al-item{padding:10px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.15s}
.al-item:hover{background:var(--gold-dim)}
.al-item.active{background:var(--gold-dim);border-left:2px solid var(--gold)}
.al-title{font-size:12px;font-weight:500;color:var(--white);line-height:1.3;margin-bottom:3px}
.al-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);display:flex;gap:8px}
.spill{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase}
.spill.live{background:var(--bull-bg);color:var(--bull);border:1px solid rgba(76,175,125,0.2)}
.spill.draft{background:rgba(255,255,255,0.04);color:var(--white3);border:1px solid var(--border2)}
/* Palette */
.wpal{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:12px}
.wpal-btn{padding:12px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;cursor:grab;transition:all 0.15s;text-align:center;user-select:none;display:flex;flex-direction:column;align-items:center;gap:5px}
.wpal-btn:hover{border-color:var(--gold-border);background:var(--gold-dim);transform:translateY(-1px)}
.wpal-btn:active{cursor:grabbing;opacity:0.7}
.wpal-icon{font-size:20px}
.wpal-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--white2);letter-spacing:0.03em;font-weight:500}
/* Canvas */
.canvas{background:var(--bg);border:1px solid var(--border);border-radius:4px;min-height:280px;padding:12px}
.c-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:4px;margin-bottom:10px;transition:border-color 0.15s}
.c-section:hover{border-color:rgba(200,169,110,0.35)}
.c-section.selected{border-color:var(--gold)!important;box-shadow:0 0 0 2px rgba(200,169,110,0.12)}
.c-sbar{padding:6px 10px;background:rgba(255,255,255,0.04);display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.07);border-radius:4px 4px 0 0;cursor:pointer}
.c-sbar:hover{background:rgba(200,169,110,0.08)}
.c-slbl{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase;flex:1}
.cbtn{width:22px;height:22px;background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);cursor:pointer;border-radius:3px;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.cbtn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}
.cbtn.del:hover{border-color:var(--bear);color:var(--bear);background:var(--bear-bg)}
.c-cols{display:grid;gap:7px;padding:7px}
.c-col{min-height:52px;border:1px dashed rgba(255,255,255,0.12);border-radius:4px;padding:5px;transition:all 0.15s}
.c-col.drag-over{border-color:var(--gold);background:rgba(200,169,110,0.07);border-style:solid}
.c-col-e{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);text-align:center;padding:12px;letter-spacing:0.1em;text-transform:uppercase;pointer-events:none}
.c-widget{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;user-select:none}
.c-widget:last-child{margin-bottom:0}
.c-widget:hover{border-color:rgba(200,169,110,0.4);background:rgba(200,169,110,0.04)}
.c-widget.selected{border-color:var(--gold);background:rgba(200,169,110,0.07);box-shadow:0 0 0 1px rgba(200,169,110,0.2)}
.c-wbar{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.c-wtype{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
.c-wprev{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.5;overflow:hidden;max-height:52px}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border:1px dashed rgba(200,169,110,0.15);border-radius:3px;background:transparent;color:rgba(200,169,110,0.4);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.15s;margin-top:5px}
.add-row-btn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}
/* Props */
.props-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:4px;position:sticky;top:74px;max-height:calc(100vh - 100px);overflow-y:auto}
.props-hdr{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg3);font-family:'DM Mono',monospace;font-size:10px;color:var(--white2);letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.pg{background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.pg-h{padding:9px 12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--white2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s;font-weight:500}
.pg-h:hover{background:var(--gold-dim);color:var(--gold)}
.pg-b{padding:10px;display:flex;flex-direction:column;gap:8px}
.pg-b.collapsed{display:none}
.pl{font-family:'DM Mono',monospace;font-size:10px;color:var(--white2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;font-weight:500}
.pi{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--white);font-family:'Syne',sans-serif;font-size:13px;padding:8px 10px;border-radius:3px;outline:none;transition:border-color 0.2s}
.pi:focus{border-color:var(--gold-border)}
.pta{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--white);font-family:'Syne',sans-serif;font-size:13px;padding:8px 10px;border-radius:3px;outline:none;resize:vertical;min-height:80px;line-height:1.7}
.pta:focus{border-color:var(--gold-border)}
.pta.code{font-family:'DM Mono',monospace;font-size:12px}
.psel{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--white);font-family:'Syne',sans-serif;font-size:13px;padding:8px 10px;border-radius:3px;outline:none}
.psel option{background:var(--bg3)}
.pr2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
/* Layout picker */
.lp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lp-opt{padding:10px 6px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;cursor:pointer;text-align:center;transition:all 0.15s}
.lp-opt:hover{border-color:var(--gold-border);background:var(--gold-dim)}
.lp-prev{display:flex;gap:3px;height:18px;margin-bottom:5px}
.lp-col{background:rgba(200,169,110,0.2);border-radius:2px;flex:1}
.lp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--white2)}
/* Preview */
.pc h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--white);margin:24px 0 10px}
.pc h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--white);margin:18px 0 8px}
.pc p{font-size:15px;color:#dedad4;line-height:1.85;margin-bottom:14px}
.pc strong{color:var(--white)}.pc em{color:var(--gold)}
.pc ul{padding-left:20px;margin-bottom:14px}.pc li{font-size:14px;color:#dedad4;margin-bottom:5px;line-height:1.7}
.pc blockquote{border-left:3px solid var(--gold);padding:10px 16px;background:rgba(200,169,110,0.06);margin:14px 0;font-style:italic;color:#a09880}
.pc hr{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:20px 0}
.pc img{max-width:100%;border-radius:4px;margin:10px 0;border:1px solid rgba(255,255,255,0.07);display:block}
.pc pre{background:#0a0b0e;border:1px solid var(--border2);border-radius:3px;padding:12px;font-family:'DM Mono',monospace;font-size:12px;color:#a8d8a8;overflow-x:auto;margin:12px 0;line-height:1.7}
.pc table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.pc th{padding:8px 11px;background:var(--bg3);border:1px solid var(--border2);color:var(--white);font-weight:600;text-align:left}
.pc td{padding:8px 11px;border:1px solid var(--border2);color:#dedad4}
/* Keynotes */
.kn-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.kn-del{width:28px;height:36px;background:none;border:1px solid var(--border2);color:var(--white3);cursor:pointer;border-radius:3px;font-size:12px;transition:all 0.15s;flex-shrink:0}
.kn-del:hover{border-color:var(--bear);color:var(--bear)}
.kn-add{width:100%;padding:6px;background:transparent;border:1px dashed rgba(200,169,110,0.2);color:rgba(200,169,110,0.5);font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;border-radius:3px;transition:all 0.15s;margin-top:2px}
.kn-add:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}
/* Tabs */
.btab{padding:10px 18px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--white2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-weight:500}
.btab:hover{color:var(--white)}
.btab.active{color:var(--gold);border-bottom-color:var(--gold)}
</style>
</head>
<body class="et-loading">
<div id="et-loader">
  <div class="et-loader-logo"><div class="et-loader-eagle">🦅</div><div class="et-loader-name">Eagle<span>Pips</span></div></div>
  <div class="et-loader-bar"><div class="et-loader-bar-fill"></div></div>
  <div class="et-loader-text">Loading editor...</div>
</div>
<div id="etSidebarMount"></div>
<div class="hub-main">
  <div class="hub-topbar">
    <a href="admin.html" style="background:none;border:1px solid var(--border2);color:var(--white3);padding:5px 10px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--white3)'">← Admin</a>
    <div class="hub-topbar-title" style="flex:1;margin-left:12px">📝 <strong>Articles</strong></div>
    <span id="saveStatus" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3)"></span>
    <button class="et-btn-ghost" onclick="saveArticle(false)" style="padding:6px 12px;font-size:11px">💾 Draft</button>
    <button class="et-btn-gold" onclick="saveArticle(true)" style="padding:6px 14px;font-size:11px">🚀 Publish</button>
  </div>
  <div class="hub-content" id="adminContent">
    <div style="text-align:center;padding:60px"><div class="et-spinner"></div></div>
  </div>
</div>

<!-- Row layout modal -->
<div class="et-modal-overlay" id="rowModal">
  <div class="et-modal" style="max-width:440px">
    <button class="et-modal-close" onclick="etCloseModal('rowModal')">✕</button>
    <div class="et-modal-title">Choose Layout</div>
    <div class="lp-grid" id="lpGrid"></div>
    <div style="margin-top:14px;padding:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px">Custom</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="customCols" min="1" max="5" value="2" class="et-form-input" style="width:70px;padding:6px 10px">
        <button class="et-btn-gold" onclick="addCustomRow()" style="padding:7px 14px;font-size:11px">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
let _user,_sb,articles=[],editingId=null,keynotes=[],rows=[],selW=null,selS=null,palType=null,dragW=null,excerptAuto=true;

const WD={
  heading:{text:'Your Heading',level:'h2',align:'left',size:'28'},
  text:{content:'Write your content here...'},
  image:{src:'',alt:'',caption:'',width:'100%'},
  button:{text:'Read More →',url:'#',style:'gold',align:'left'},
  quote:{text:'Quote here.',author:''},
  callout:{text:'Important note.',type:'note'},
  code:{code:'// your code',lang:'javascript'},
  table:{headers:'Column 1,Column 2,Column 3',rows:'Cell 1,Cell 2,Cell 3\nCell A,Cell B,Cell C'},
  video:{url:'',type:'youtube'},
  divider:{color:'rgba(255,255,255,0.08)'},
  html:{code:'<p>Custom HTML</p>'},
};

const LAYOUTS=[
  {cols:[1],label:'Full'},
  {cols:[1,1],label:'2 Equal'},
  {cols:[1,2],label:'1/3+2/3'},
  {cols:[2,1],label:'2/3+1/3'},
  {cols:[1,1,1],label:'3 Equal'},
  {cols:[1,1,1,1],label:'4 Equal'},
];

async function main(){
  const res=await initEtSidebar('admin');if(!res)return;
  _user=res.user;_sb=res.sb;
  if(!_user.user_metadata?.is_admin){document.getElementById('adminContent').innerHTML='<div style="text-align:center;padding:60px;color:var(--white3)">Access denied.</div>';return;}
  renderLayout();await loadArticles();
}

function renderLayout(){
  document.getElementById('adminContent').innerHTML=`
    <div style="display:grid;grid-template-columns:240px 1fr 250px;gap:12px;align-items:start">
      <!-- List -->
      <div>
        <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;position:sticky;top:74px;max-height:calc(100vh - 100px);display:flex;flex-direction:column">
          <div style="padding:10px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);flex-shrink:0">
            <span style="font-size:12px;font-weight:600;color:var(--white)">Articles</span>
            <button class="et-btn-gold" onclick="newArticle()" style="padding:4px 10px;font-size:10px">+ New</button>
          </div>
          <div style="overflow-y:auto;flex:1" id="artList"><div style="padding:20px;text-align:center"><div class="et-spinner"></div></div></div>
        </div>
      </div>

      <!-- Editor -->
      <div>
        <!-- Meta -->
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:12px;display:flex;flex-direction:column;gap:11px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
            <div><label class="et-form-label">Title *</label><input type="text" class="et-form-input" id="eTitle" placeholder="EUR/USD Weekly Analysis..." oninput="autoSlug();autoExcerpt()"></div>
            <div><label class="et-form-label">Slug *</label><input type="text" class="et-form-input" id="eSlug" placeholder="eurusd-weekly-2026"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
            <div><label class="et-form-label">Category</label>
              <select class="et-form-input" id="eCategory"><option>Market Update</option><option>Technical Analysis</option><option>Fundamental Analysis</option></select>
            </div>
            <div><label class="et-form-label">Author</label><input type="text" class="et-form-input" id="eAuthor"></div>
          </div>
          <div><label class="et-form-label">Cover Image URL</label><input type="url" class="et-form-input" id="eCover" placeholder="https://..."></div>
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
              <label class="et-form-label" style="margin:0">Excerpt</label>
              <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--white3)">
                <input type="checkbox" id="excerptAutoCheck" checked onchange="toggleExcerptAuto()" style="accent-color:var(--gold)"> Auto from content
              </label>
            </div>
            <textarea class="et-form-input" id="eExcerpt" rows="2" style="resize:none" placeholder="Auto-generated..." disabled></textarea>
          </div>
          <div><label class="et-form-label">Tags</label><input type="text" class="et-form-input" id="eTags" placeholder="EUR/USD, Weekly, COT Data"></div>
          <div>
            <label class="et-form-label">Key Points</label>
            <div id="keynotesWrap"></div>
            <button class="kn-add" onclick="addKeynote()">+ Add Key Point</button>
          </div>
        </div>

        <!-- Builder -->
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden">
          <div style="display:flex;border-bottom:1px solid var(--border2);background:var(--bg3)">
            <button class="btab active" id="tab-build" onclick="switchTab('build')">⚙ Builder</button>
            <button class="btab" id="tab-prev" onclick="switchTab('prev')">👁 Preview</button>
          </div>
          <!-- Builder panel -->
          <div id="panel-build" style="padding:11px">
            <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px">Drag onto canvas</div>
            <div class="wpal">
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'heading')"><div class="wpal-icon">H</div><div class="wpal-lbl">Heading</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'text')"><div class="wpal-icon">T</div><div class="wpal-lbl">Text</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'image')"><div class="wpal-icon">🖼</div><div class="wpal-lbl">Image</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'button')"><div class="wpal-icon">⬜</div><div class="wpal-lbl">Button</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'quote')"><div class="wpal-icon">❝</div><div class="wpal-lbl">Quote</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'callout')"><div class="wpal-icon">📋</div><div class="wpal-lbl">Callout</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'code')"><div class="wpal-icon">&lt;/&gt;</div><div class="wpal-lbl">Code</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'table')"><div class="wpal-icon">⊞</div><div class="wpal-lbl">Table</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'video')"><div class="wpal-icon">▶</div><div class="wpal-lbl">Video</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'divider')"><div class="wpal-icon">—</div><div class="wpal-lbl">Divider</div></div>
              <div class="wpal-btn" draggable="true" ondragstart="pd(event,'html')"><div class="wpal-icon">{ }</div><div class="wpal-lbl">HTML</div></div>
            </div>
            <div class="canvas" id="canvas" onclick="desel()">
              <div class="c-col-e" id="canvasEmpty" style="padding:30px">Drag widgets here or click + Add Row</div>
            </div>
            <button class="add-row-btn" onclick="etOpenModal('rowModal')">＋ Add Row</button>
          </div>
          <!-- Preview panel -->
          <div id="panel-prev" style="display:none;padding:20px">
            <div class="pc" id="previewContent"></div>
          </div>
        </div>
      </div>

      <!-- Properties -->
      <div>
        <div class="props-wrap">
          <div class="props-hdr" id="propsTitle">Properties</div>
          <div style="padding:11px" id="propsBody">
            <div style="text-align:center;padding:28px 14px;color:var(--white3);font-size:12px">
              <div style="font-size:22px;opacity:0.15;margin-bottom:7px">✏️</div>Click a widget to edit
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Build layout picker
  const lp=document.getElementById('lpGrid');
  lp.innerHTML=LAYOUTS.map(l=>`
    <div class="lp-opt" onclick="addRow(${JSON.stringify(l.cols)})">
      <div class="lp-prev">${l.cols.map(w=>`<div class="lp-col" style="flex:${w}"></div>`).join('')}</div>
      <div class="lp-lbl">${l.label}</div>
    </div>`).join('');

  addKeynote();
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveArticle(false);}});
}

function switchTab(t){
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('panel-build').style.display=t==='build'?'block':'none';
  document.getElementById('panel-prev').style.display=t==='prev'?'block':'none';
  if(t==='prev')document.getElementById('previewContent').innerHTML=buildPreview();
}

async function loadArticles(){
  const{data}=await _sb.from('articles').select('*').order('created_at',{ascending:false});
  articles=data||[];renderList();
}

function renderList(){
  const el=document.getElementById('artList');
  if(!articles.length){el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--white3)">No articles yet.</div>';return;}
  el.innerHTML=articles.map(a=>`
    <div class="al-item ${editingId===a.id?'active':''}" onclick="loadArt('${a.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:5px;margin-bottom:3px">
        <div class="al-title">${a.title||'Untitled'}</div>
        <span class="spill ${a.published?'live':'draft'}">${a.published?'Live':'Draft'}</span>
      </div>
      <div class="al-meta"><span>${a.category||'—'}</span><span>${new Date(a.created_at).toLocaleDateString('en-US',{day:'numeric',month:'short'})}</span></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        ${a.published?`<a href="article.html?slug=${a.slug}" target="_blank" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);text-decoration:none">↗ View</a>`:''}
        <button onclick="event.stopPropagation();delArt('${a.id}')" style="background:none;border:none;color:var(--white3);cursor:pointer;font-size:9px;font-family:'DM Mono',monospace;transition:color 0.15s" onmouseover="this.style.color='var(--bear)'" onmouseout="this.style.color='var(--white3)'">🗑 Delete</button>
      </div>
    </div>`).join('');
}

function newArticle(){
  editingId=null;rows=[];selW=null;selS=null;
  ['eTitle','eSlug','eCover','eTags'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('eExcerpt').value='';
  document.getElementById('eCategory').value='Market Update';
  document.getElementById('eAuthor').value=_user.user_metadata?.full_name||'EaglePips Team';
  document.getElementById('excerptAutoCheck').checked=true;
  document.getElementById('eExcerpt').disabled=true;
  excerptAuto=true;keynotes=[];renderKeynotes();addKeynote();
  renderCanvas();setSS('');renderList();
}

function loadArt(id){
  const a=articles.find(x=>x.id===id);if(!a)return;
  editingId=id;
  document.getElementById('eTitle').value=a.title||'';
  document.getElementById('eSlug').value=a.slug||'';
  document.getElementById('eCategory').value=a.category||'Market Update';
  document.getElementById('eAuthor').value=a.author_name||'EaglePips Team';
  document.getElementById('eCover').value=a.cover_url||'';
  document.getElementById('eTags').value=a.tags?a.tags.join(', '):'';
  excerptAuto=!a.excerpt;
  document.getElementById('excerptAutoCheck').checked=excerptAuto;
  document.getElementById('eExcerpt').value=a.excerpt||'';
  document.getElementById('eExcerpt').disabled=excerptAuto;
  try{const p=JSON.parse(a.content||'[]');rows=Array.isArray(p)?p:[];}
  catch{rows=a.content?[{id:uid(),cols:[{id:uid(),flex:'1fr',widgets:[{id:uid(),type:'text',props:{content:a.content}}]}]}]:[];}
  keynotes=[...(a.keynotes||[])];renderKeynotes();if(!keynotes.length)addKeynote();
  renderCanvas();setSS('');renderList();
}

function toggleExcerptAuto(){
  excerptAuto=document.getElementById('excerptAutoCheck').checked;
  document.getElementById('eExcerpt').disabled=excerptAuto;
  if(excerptAuto)autoExcerpt();
}
function autoExcerpt(){
  if(!excerptAuto)return;
  for(const row of rows)for(const col of row.cols||[])for(const w of col.widgets||[])
    if(w.type==='text'&&w.props?.content){document.getElementById('eExcerpt').value=w.props.content.replace(/<[^>]+>/g,'').slice(0,160);return;}
  const t=document.getElementById('eTitle').value;if(t)document.getElementById('eExcerpt').value=t;
}

function renderCanvas(){
  const canvas=document.getElementById('canvas');
  const empty=document.getElementById('canvasEmpty');
  if(empty)empty.style.display=rows.length?'none':'block';
  document.querySelectorAll('.c-section').forEach(e=>e.remove());
  document.querySelector('.add-row-btn')?.remove();
  rows.forEach((row,ri)=>canvas.appendChild(mkSec(row,ri)));
  const btn=document.createElement('button');btn.className='add-row-btn';btn.innerHTML='＋ Add Row';btn.onclick=()=>etOpenModal('rowModal');
  canvas.appendChild(btn);
}

function mkWHTML(w,cId,rId){
  return `<div class="c-widget${selW===w.id?' selected':''}" id="w-${w.id}"
    draggable="true"
    ondragstart="wds(event,'${w.id}','${cId}','${rId}')"
    onclick="event.stopPropagation();selWidget('${w.id}','${cId}','${rId}')">
    <div class="c-wbar">
      <span style="cursor:grab;color:rgba(255,255,255,0.35);font-size:11px;margin-right:2px">⠿</span>
      <span class="c-wtype">${w.type}</span>
      <div style="display:flex;gap:2px;margin-left:auto">
        <button class="cbtn" onclick="event.stopPropagation();cpW('${w.id}','${cId}','${rId}')" style="width:18px;height:18px;font-size:8px" title="Duplicate">⧉</button>
        <button class="cbtn del" onclick="event.stopPropagation();rmW('${w.id}','${cId}','${rId}')" style="width:18px;height:18px;font-size:8px" title="Delete">✕</button>
      </div>
    </div>
    <div class="c-wprev">${getPrev(w)}</div>
  </div>`;
}

function mkSec(row,ri){
  const el=document.createElement('div');
  el.className='c-section';el.id='row-'+row.id;el.dataset.ri=ri;
  el.onclick=e=>{e.stopPropagation();selSec(row.id);};
  const fr=row.cols.map(c=>c.flex||'1fr').join(' ');
  el.innerHTML=`
    <div class="c-sbar">
      <span class="c-slbl">Row · ${row.cols.length} col${row.cols.length>1?'s':''}</span>
      <div style="display:flex;gap:3px">
        ${ri>0?`<button class="cbtn" onclick="event.stopPropagation();mvRow('${row.id}',-1)" title="Move up">↑</button>`:''}
        ${ri<rows.length-1?`<button class="cbtn" onclick="event.stopPropagation();mvRow('${row.id}',1)" title="Move down">↓</button>`:''}
        <button class="cbtn" onclick="event.stopPropagation();cpRow('${row.id}')" title="Duplicate">⧉</button>
        <button class="cbtn del" onclick="event.stopPropagation();rmRow('${row.id}')" title="Delete">✕</button>
      </div>
    </div>
    <div class="c-cols" style="grid-template-columns:${fr}">
      ${row.cols.map((col,ci)=>`
        <div class="c-col" id="col-${col.id}" data-ri="${ri}" data-ci="${ci}"
          ondragover="cdo(event,'${col.id}')" ondragleave="cdl(event,'${col.id}')" ondrop="cdrop(event,'${col.id}','${row.id}')">
          ${col.widgets?.length ? col.widgets.map(w=>mkWHTML(w,col.id,row.id)).join('') : '<div class="c-col-e">Drop here</div>'}
        </div>`).join('')}
    </div>`;
  return el;
}

function getPrev(w){
  const p=w.props||{};
  switch(w.type){
    case'heading': return`<div style="font-family:'Playfair Display',serif;font-size:${Math.min(parseInt(p.size)||20,20)}px;font-weight:700;color:#fff">${p.text||'Heading'}</div>`;
    case'text':    return`<div style="font-size:11px;color:#c8c4bc;line-height:1.5">${(p.content||'').slice(0,90)}</div>`;
    case'image':   return p.src?`<img src="${p.src}" style="max-width:100%;max-height:44px;object-fit:cover;border-radius:2px" onerror="this.style.display='none'">`:`<div style="background:rgba(255,255,255,0.05);padding:8px;text-align:center;font-size:10px;color:rgba(255,255,255,0.3)">🖼 Image</div>`;
    case'button':  return`<span style="display:inline-flex;padding:4px 10px;background:var(--gold);color:#08090c;font-size:10px;border-radius:2px">${p.text||'Button'}</span>`;
    case'quote':   return`<div style="border-left:3px solid var(--gold);padding:5px 9px;font-size:11px;color:#a09880;font-style:italic">${(p.text||'').slice(0,70)}</div>`;
    case'callout': const cc={note:'var(--gold)',bull:'var(--bull)',bear:'var(--bear)',info:'#6ba3ff'}[p.type||'note'];return`<div style="border-left:3px solid ${cc};padding:5px 9px;font-size:11px;color:#c8c4bc">${(p.text||'').slice(0,70)}</div>`;
    case'code':    return`<div style="font-family:'DM Mono',monospace;font-size:10px;color:#a8d8a8;background:#0a0b0e;padding:5px 7px;border-radius:2px">${(p.code||'').slice(0,50)}</div>`;
    case'table':   return`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold)">⊞ ${(p.headers||'').split(',').length} cols</div>`;
    case'video':   return`<div style="background:rgba(255,255,255,0.05);padding:8px;text-align:center;font-size:10px;color:rgba(255,255,255,0.3)">▶ ${p.url?'Video':'Add URL'}</div>`;
    case'divider': return`<hr style="border:none;border-top:1px solid rgba(255,255,255,0.15);margin:3px 0">`;
    case'html':    return`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold)">{ } ${(p.code||'').slice(0,35)}</div>`;
    default:       return`<div style="font-size:10px;color:rgba(255,255,255,0.3)">${w.type}</div>`;
  }
}

// Row ops
function addRow(cols){etCloseModal('rowModal');rows.push({id:uid(),cols:cols.map(f=>({id:uid(),flex:f+'fr',widgets:[]}))});renderCanvas();}
function addCustomRow(){addRow(Array(parseInt(document.getElementById('customCols').value)||2).fill(1));}
function mvRow(id,d){const i=rows.findIndex(r=>r.id===id);const n=i+d;if(n<0||n>=rows.length)return;[rows[i],rows[n]]=[rows[n],rows[i]];renderCanvas();}
function cpRow(id){const i=rows.findIndex(r=>r.id===id);if(i<0)return;const c=JSON.parse(JSON.stringify(rows[i]));c.id=uid();c.cols.forEach(col=>{col.id=uid();col.widgets.forEach(w=>w.id=uid());});rows.splice(i+1,0,c);renderCanvas();}
function rmRow(id){if(!confirm('Delete row?'))return;rows=rows.filter(r=>r.id!==id);if(selS===id){selS=null;rProps(null,null,null);}renderCanvas();}

// Widget ops
function addW(type,cId,rId){const row=rows.find(r=>r.id===rId);const col=row?.cols.find(c=>c.id===cId);if(!col)return;col.widgets.push({id:uid(),type,props:{...WD[type]}});renderCanvas();autoExcerpt();}
function rmW(wId,cId,rId){const row=rows.find(r=>r.id===rId);const col=row?.cols.find(c=>c.id===cId);if(!col)return;col.widgets=col.widgets.filter(w=>w.id!==wId);if(selW===wId){selW=null;rProps(null,null,null);}renderCanvas();}
function cpW(wId,cId,rId){const row=rows.find(r=>r.id===rId);const col=row?.cols.find(c=>c.id===cId);if(!col)return;const wi=col.widgets.findIndex(w=>w.id===wId);if(wi<0)return;const c={...JSON.parse(JSON.stringify(col.widgets[wi])),id:uid()};col.widgets.splice(wi+1,0,c);renderCanvas();}
function upd(wId,cId,rId,k,v){
  const row=rows.find(r=>r.id===rId);const col=row?.cols.find(c=>c.id===cId);const w=col?.widgets.find(x=>x.id===wId);
  if(!w)return;
  w.props={...w.props,[k]:v};
  const el=document.getElementById('w-'+wId);
  if(el){const pv=el.querySelector('.c-wprev');if(pv)pv.innerHTML=getPrev(w);}
  autoExcerpt();
}

// Selection
function selWidget(wId,cId,rId){selW=wId;selS=null;document.querySelectorAll('.c-widget,.c-section').forEach(e=>e.classList.remove('selected'));document.getElementById('w-'+wId)?.classList.add('selected');const row=rows.find(r=>r.id===rId);const col=row?.cols.find(c=>c.id===cId);const w=col?.widgets.find(x=>x.id===wId);if(w)rProps(w,cId,rId);}
function selSec(rId){selS=rId;selW=null;document.querySelectorAll('.c-widget,.c-section').forEach(e=>e.classList.remove('selected'));document.getElementById('row-'+rId)?.classList.add('selected');const row=rows.find(r=>r.id===rId);if(row)rRowProps(row);}
function desel(){selW=null;selS=null;document.querySelectorAll('.c-widget,.c-section').forEach(e=>e.classList.remove('selected'));rProps(null,null,null);}

// Props
function rProps(w,cId,rId){
  document.getElementById('propsTitle').textContent=w?w.type.toUpperCase()+' Props':'Properties';
  const el=document.getElementById('propsBody');
  if(!w){el.innerHTML='<div style="text-align:center;padding:28px 14px;color:var(--white3);font-size:12px"><div style="font-size:22px;opacity:0.15;margin-bottom:7px">✏️</div>Click a widget to edit</div>';return;}
  const p=w.props||{};
  const H=(lbl,c)=>`<div class="pg"><div class="pg-h" onclick="this.nextElementSibling.classList.toggle('collapsed')">${lbl}<span>▾</span></div><div class="pg-b">${c}</div></div>`;
  const I=(k,l,v,t='text')=>`<div><div class="pl">${l}</div><input type="${t}" class="pi" value="${String(v||'').replace(/"/g,'&quot;')}" oninput="upd('${w.id}','${cId}','${rId}','${k}',this.value)"></div>`;
  const TA=(k,l,v,r=4,code=false)=>`<div><div class="pl">${l}</div><textarea class="pta${code?' code':''}" rows="${r}" oninput="upd('${w.id}','${cId}','${rId}','${k}',this.value)">${String(v||'').replace(/</g,'&lt;')}</textarea></div>`;
  const SE=(k,l,opts,v)=>`<div><div class="pl">${l}</div><select class="psel" onchange="upd('${w.id}','${cId}','${rId}','${k}',this.value)">${opts.map(([val,label])=>`<option value="${val}" ${v===val?'selected':''}>${label}</option>`).join('')}</select></div>`;
  const R2=(a,b)=>`<div class="pr2">${a}${b}</div>`;
  let html='';
  switch(w.type){
    case'heading': html=H('Content',TA('text','Text',p.text,2)+R2(I('size','Size px',p.size||'28','number'),SE('level','Tag',[['h1','H1'],['h2','H2'],['h3','H3'],['h4','H4']],p.level||'h2'))+SE('align','Align',[['left','Left'],['center','Center'],['right','Right']],p.align||'left'));break;
    case'text': html=H('Content',TA('content','Content (Markdown)',p.content,6));break;
    case'image': html=H('Image',
    `<div><div class="pl">Image</div>
     <div style="display:flex;gap:6px;align-items:stretch">
       <input type="url" class="pi" style="flex:1" value="${(p.src||'').replace(/"/g,'&quot;')}" placeholder="https://... or browse" oninput="upd('${w.id}','${cId}','${rId}','src',this.value)" id="imgSrc-${w.id}">
       <button onclick="openMediaPicker(url=>{upd('${w.id}','${cId}','${rId}','src',url);document.getElementById('imgSrc-${w.id}').value=url;})" style="padding:0 10px;background:var(--bg3);border:1px solid var(--border);color:var(--white2);border-radius:3px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all 0.15s" onmouseover="this.style.borderColor='var(--gold-border)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--white2)'">🖼 Browse</button>
     </div></div>`+
    I('alt','Alt Text',p.alt)+I('caption','Caption',p.caption)+I('width','Width',p.width||'100%'));break;
    case'button': html=H('Button',I('text','Label',p.text)+I('url','URL',p.url,'url')+R2(SE('style','Style',[['gold','Gold'],['outline','Outline'],['ghost','Ghost']],p.style||'gold'),SE('align','Align',[['left','Left'],['center','Center'],['right','Right']],p.align||'left')));break;
    case'quote': html=H('Quote',TA('text','Text',p.text,3)+I('author','Author',p.author));break;
    case'callout': html=H('Callout',TA('text','Content',p.text,3)+SE('type','Type',[['note','📝 Note'],['bull','🟢 Bullish'],['bear','🔴 Bearish'],['info','ℹ️ Info']],p.type||'note'));break;
    case'code': html=H('Code',TA('code','Code',p.code,6,true)+I('lang','Language',p.lang||'javascript'));break;
    case'table': html=H('Table',I('headers','Headers (comma sep)',p.headers)+TA('rows','Rows (1/line, comma sep)',p.rows,5));break;
    case'video': html=H('Video',I('url','URL / ID',p.url,'url')+SE('type','Type',[['youtube','YouTube'],['vimeo','Vimeo'],['direct','Direct MP4']],p.type||'youtube'));break;
    case'divider': html=H('Divider',I('color','Color',p.color||'rgba(255,255,255,0.08)'));break;
    case'html': html=H('HTML',TA('code','HTML',p.code,6,true));break;
  }
  html+=`<button onclick="rmW('${w.id}','${cId}','${rId}')" style="width:100%;padding:6px;background:transparent;border:1px solid rgba(224,92,92,0.2);color:var(--bear);font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;border-radius:3px;transition:all 0.2s;margin-top:4px" onmouseover="this.style.background='var(--bear-bg)'" onmouseout="this.style.background='transparent'">🗑 Remove</button>`;
  el.innerHTML=html;
}

function rRowProps(row){
  document.getElementById('propsTitle').textContent='ROW Props';
  document.getElementById('propsBody').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:6px">
      ${row.cols.map((c,i)=>`<div style="display:flex;align-items:center;gap:6px"><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--white3);min-width:38px">Col ${i+1}</span><input type="number" value="${parseInt(c.flex)||1}" min="1" max="6" class="pi" style="padding:5px 7px" onchange="upColFlex('${row.id}',${i},this.value)"></div>`).join('')}
    </div>
    <button onclick="rmRow('${row.id}')" style="width:100%;padding:6px;background:transparent;border:1px solid rgba(224,92,92,0.2);color:var(--bear);font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;border-radius:3px;margin-top:6px" onmouseover="this.style.background='var(--bear-bg)'" onmouseout="this.style.background='transparent'">🗑 Delete Row</button>`;
}

function upColFlex(rId,ci,v){const row=rows.find(r=>r.id===rId);if(!row?.cols[ci])return;row.cols[ci].flex=v+'fr';const el=document.getElementById('row-'+rId);if(el){const c=el.querySelector('.c-cols');if(c)c.style.gridTemplateColumns=row.cols.map(x=>x.flex||'1fr').join(' ');}}

// Drag & Drop
function pd(e,type){palType=type;dragW=null;e.dataTransfer.effectAllowed='copy';}
function wds(e,wId,cId,rId){dragW={wId,cId,rId};palType=null;e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function cdo(e,cId){e.preventDefault();document.getElementById('col-'+cId)?.classList.add('drag-over');}
function cdl(e,cId){document.getElementById('col-'+cId)?.classList.remove('drag-over');}
function cdrop(e,cId,rId){
  e.preventDefault();e.stopPropagation();
  document.getElementById('col-'+cId)?.classList.remove('drag-over');
  if(palType){addW(palType,cId,rId);palType=null;}
  else if(dragW){
    const{wId,cId:fc,rId:fr}=dragW;if(fc===cId)return;
    const fromR=rows.find(r=>r.id===fr);const fromC=fromR?.cols.find(c=>c.id===fc);
    const toR=rows.find(r=>r.id===rId);const toC=toR?.cols.find(c=>c.id===cId);
    if(!fromC||!toC)return;
    const wi=fromC.widgets.findIndex(w=>w.id===wId);if(wi<0)return;
    const[w]=fromC.widgets.splice(wi,1);toC.widgets.push(w);
    renderCanvas();dragW=null;
  }
}

// Build preview HTML
function buildPreview(){
  if(!rows.length)return'<div style="text-align:center;padding:40px;color:var(--white3)">No content yet.</div>';
  return rows.map(row=>`<div style="display:grid;grid-template-columns:${row.cols.map(c=>c.flex||'1fr').join(' ')};gap:20px;margin-bottom:20px">${row.cols.map(col=>`<div>${(col.widgets||[]).map(wHTML).join('')}</div>`).join('')}</div>`).join('');
}

function wHTML(w){
  const p=w.props||{};
  switch(w.type){
    case'heading': return`<${p.level||'h2'} style="font-family:'Playfair Display',serif;font-size:${p.size||28}px;font-weight:700;color:#fff;text-align:${p.align||'left'};margin:0 0 12px">${p.text||''}</${p.level||'h2'}>`;
    case'text':    return`<div style="font-size:15px;color:#dedad4;line-height:1.85;margin-bottom:12px">${parseMd(p.content||'')}</div>`;
    case'image':   return p.src?`<figure style="margin:0 0 14px"><img src="${p.src}" alt="${p.alt||''}" style="width:${p.width||'100%'};max-width:100%;border-radius:4px;display:block;border:1px solid rgba(255,255,255,0.07)">${p.caption?`<figcaption style="font-family:'DM Mono',monospace;font-size:11px;color:#7a7570;text-align:center;margin-top:5px">${p.caption}</figcaption>`:''}</figure>`:'';
    case'button':  const bs={gold:`background:var(--gold);color:#08090c;border:1px solid var(--gold)`,outline:`background:transparent;color:#c8c4bc;border:1px solid rgba(255,255,255,0.15)`,ghost:`background:transparent;color:rgba(255,255,255,0.6);border:none`}[p.style||'gold'];return`<div style="text-align:${p.align||'left'};margin-bottom:12px"><a href="${p.url||'#'}" style="${bs};display:inline-flex;padding:10px 22px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-decoration:none;border-radius:3px;letter-spacing:0.06em">${p.text||'Button'}</a></div>`;
    case'quote':   return`<blockquote style="border-left:3px solid var(--gold);padding:11px 16px;background:rgba(200,169,110,0.06);margin:0 0 14px;font-style:italic;color:#a09880;border-radius:0 3px 3px 0"><p style="margin:0 0 5px;font-size:15px;line-height:1.7">${p.text||''}</p>${p.author?`<cite style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-style:normal">— ${p.author}</cite>`:''}</blockquote>`;
    case'callout': const ct={note:'var(--gold)',bull:'var(--bull)',bear:'var(--bear)',info:'#6ba3ff'}[p.type||'note'];const cb={note:'rgba(200,169,110,0.07)',bull:'rgba(76,175,125,0.07)',bear:'rgba(224,92,92,0.07)',info:'rgba(74,158,255,0.07)'}[p.type||'note'];return`<div style="border-left:3px solid ${ct};background:${cb};padding:11px 15px;border-radius:0 3px 3px 0;font-size:14px;color:#dedad4;line-height:1.7;margin:0 0 14px">${p.text||''}</div>`;
    case'code':    return`<pre style="background:#0a0b0e;border:1px solid var(--border2);border-radius:3px;padding:12px;font-family:'DM Mono',monospace;font-size:12px;color:#a8d8a8;overflow-x:auto;margin:0 0 14px;line-height:1.7"><code>${(p.code||'').replace(/</g,'&lt;')}</code></pre>`;
    case'table':{const hs=(p.headers||'Col 1,Col 2').split(',');const tr=(p.rows||'').split('\n').filter(Boolean).map(r=>`<tr>${r.split(',').map(c=>`<td style="padding:8px 11px;border:1px solid var(--border2);color:#dedad4">${c.trim()}</td>`).join('')}</tr>`).join('');return`<div style="overflow-x:auto;margin:0 0 14px"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>${hs.map(h=>`<th style="padding:8px 11px;background:var(--bg3);border:1px solid var(--border2);color:var(--white);font-weight:600;text-align:left">${h.trim()}</th>`).join('')}</tr></thead><tbody>${tr}</tbody></table></div>`;}
    case'video':{if(!p.url)return'';let em='';if(p.type==='youtube'){const v=p.url.match(/(?:v=|youtu\.be\/)([^&\s]+)/)?.[1]||p.url;em=`<iframe src="https://www.youtube.com/embed/${v}" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none"></iframe>`;}else if(p.type==='vimeo'){const v=p.url.match(/vimeo\.com\/(\d+)/)?.[1]||p.url;em=`<iframe src="https://player.vimeo.com/video/${v}" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none"></iframe>`;}else em=`<video src="${p.url}" controls style="position:absolute;inset:0;width:100%;height:100%"></video>`;return`<div style="position:relative;padding-bottom:56.25%;border-radius:4px;overflow:hidden;margin:0 0 14px">${em}</div>`;}
    case'divider': return`<hr style="border:none;border-top:1px solid ${p.color||'rgba(255,255,255,0.08)'};margin:18px 0">`;
    case'html':    return`<div style="margin:0 0 14px">${p.code||''}</div>`;
    default:       return'';
  }
}

function parseMd(c){
  if(!c)return'';
  return c.replace(/^### (.+)$/gm,'<h3 style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:700;color:#fff;margin:18px 0 8px">$1</h3>')
    .replace(/^## (.+)$/gm,'<h2 style="font-family:\'Playfair Display\',serif;font-size:22px;font-weight:700;color:#fff;margin:22px 0 10px">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:#fff">$1</strong>')
    .replace(/\*(.+?)\*/g,'<em style="color:var(--gold)">$1</em>')
    .replace(/^- (.+)$/gm,'<li style="margin-bottom:5px">$1</li>')
    .replace(/(<li[\s\S]+?<\/li>)/g,'<ul style="padding-left:20px;margin-bottom:14px">$1</ul>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid rgba(255,255,255,0.08);margin:20px 0">')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" style="color:var(--gold);text-decoration:underline;text-underline-offset:3px">$1</a>')
    .split('\n\n').map(b=>{b=b.trim();if(!b||b.startsWith('<'))return b;return'<p style="margin-bottom:14px">'+b.replace(/\n/g,'<br>')+'</p>';}).join('');
}

// Keynotes
function renderKeynotes(){
  const w=document.getElementById('keynotesWrap');if(!w)return;
  w.innerHTML=keynotes.map((k,i)=>`<div class="kn-row"><input type="text" class="et-form-input keynote-input" value="${(k||'').replace(/"/g,'&quot;')}" placeholder="Key point #${i+1}" oninput="keynotes[${i}]=this.value"><button class="kn-del" onclick="keynotes.splice(${i},1);renderKeynotes()">✕</button></div>`).join('');
}
function addKeynote(){keynotes.push('');renderKeynotes();setTimeout(()=>{const els=document.querySelectorAll('.keynote-input');els[els.length-1]?.focus();},50);}

function autoSlug(){
  if(editingId)return;
  document.getElementById('eSlug').value=document.getElementById('eTitle').value.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,60);
}

async function saveArticle(publish){
  const title=document.getElementById('eTitle').value.trim();
  const slug=document.getElementById('eSlug').value.trim();
  if(!title||!slug){alert('Title and slug are required.');return;}
  const kn=keynotes.filter(k=>(k||'').trim());
  const tags=document.getElementById('eTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const payload={
    title,slug,
    category:document.getElementById('eCategory').value,
    excerpt:document.getElementById('eExcerpt').value.trim()||null,
    cover_url:document.getElementById('eCover').value.trim()||null,
    tags:tags.length?tags:null,
    keynotes:kn.length?kn:null,
    author_name:document.getElementById('eAuthor').value.trim()||'EaglePips',
    content:JSON.stringify(rows),
    published:publish,
    published_at:publish?new Date().toISOString():null,
    updated_at:new Date().toISOString()
  };
  setSS('Saving...');
  let err;
  if(editingId){const r=await _sb.from('articles').update(payload).eq('id',editingId);err=r.error;}
  else{const r=await _sb.from('articles').insert(payload).select().single();err=r.error;if(!err&&r.data)editingId=r.data.id;}
  if(err){alert(err.message);setSS('Error');return;}
  setSS(publish?'✓ Published':'✓ Draft saved');
  await loadArticles();
}

async function delArt(id){
  if(!confirm('Delete this article permanently?'))return;
  await _sb.from('articles').delete().eq('id',id);
  if(editingId===id)newArticle();
  await loadArticles();
}

function setSS(m){const el=document.getElementById('saveStatus');if(el)el.textContent=m;}
function uid(){return Math.random().toString(36).slice(2,10);}

// ── Media Picker ─────────────────────────────────────
const BUCKET='media';
let mpFiles=[],mpSelected=null,mpCallback=null,mpSearch='';

function openMediaPicker(callback){
  mpCallback=callback;mpSelected=null;mpSearch='';
  document.getElementById('mpSearch').value='';
  document.getElementById('mpSelectBtn').disabled=true;
  etOpenModal('mediaPickerModal');
  mpLoad();
}

async function mpLoad(){
  const{data}=await _sb.storage.from(BUCKET).list('',{limit:500,sortBy:{column:'created_at',order:'desc'}});
  mpFiles=(data||[]).filter(f=>f.name!=='.emptyFolderPlaceholder'&&/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(f.name));
  mpRender();
}

function mpGetUrl(name){
  const{data}=_sb.storage.from(BUCKET).getPublicUrl(name);
  return data.publicUrl;
}

function mpRender(){
  const grid=document.getElementById('mpGrid');
  let files=mpFiles;
  if(mpSearch)files=files.filter(f=>f.name.toLowerCase().includes(mpSearch.toLowerCase()));
  if(!files.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--white3);font-size:12px">No images found. Upload some!</div>';return;}
  grid.innerHTML=files.map(f=>{
    const url=mpGetUrl(f.name);
    const sel=mpSelected===f.name;
    return`<div onclick="mpSelect('${f.name.replace(/'/g,"\'")}','${url.replace(/'/g,"\'")}');event.stopPropagation()"
      style="border:2px solid ${sel?'var(--gold)':'rgba(255,255,255,0.08)'};border-radius:4px;overflow:hidden;cursor:pointer;transition:all 0.15s;background:var(--bg3);position:relative"
      onmouseover="if('${f.name}'!==mpSelected)this.style.borderColor='rgba(200,169,110,0.4)'"
      onmouseout="if('${f.name}'!==mpSelected)this.style.borderColor='rgba(255,255,255,0.08)'">
      <img src="${url}" style="width:100%;height:90px;object-fit:cover;display:block" loading="lazy" onerror="this.style.display='none'">
      ${sel?'<div style="position:absolute;top:4px;right:4px;background:var(--gold);color:#08090c;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">✓</div>':''}
      <div style="padding:5px 6px;font-family:'DM Mono',monospace;font-size:8px;color:var(--white2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div>
    </div>`;
  }).join('');
}

function mpSelect(name,url){
  mpSelected=name;
  document.getElementById('mpSelectBtn').disabled=false;
  mpRender();
}

function mpFilter(q){mpSearch=q;mpRender();}

function mpConfirm(){
  if(!mpSelected||!mpCallback)return;
  const url=mpGetUrl(mpSelected);
  mpCallback(url);
  etCloseModal('mediaPickerModal');
}

async function mpUpload(files){
  if(!files?.length)return;
  const status=document.getElementById('mpUploadStatus');
  status.style.display='block';
  for(const file of files){
    const ext=file.name.split('.').pop();
    const base=file.name.replace(/\.[^.]+$/,'').replace(/[^a-z0-9-_]/gi,'-').toLowerCase();
    const fname=`${base}-${Date.now()}.${ext}`;
    status.textContent=`Uploading ${file.name}...`;
    const{error}=await _sb.storage.from(BUCKET).upload(fname,file,{cacheControl:'3600',upsert:false});
    if(error)status.textContent=`Error: ${error.message}`;
  }
  status.textContent='Done!';
  await mpLoad();
  setTimeout(()=>{status.style.display='none';},2000);
}
document.addEventListener('click',e=>{if(e.target.classList.contains('et-modal-overlay'))etCloseModal(e.target.id);});
</script>
<!-- Media Picker Modal -->
<div class="et-modal-overlay" id="mediaPickerModal">
  <div class="et-modal" style="max-width:860px;max-height:90vh;display:flex;flex-direction:column;padding:0">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg3)">
      <span style="font-size:14px;font-weight:600;color:var(--white)">🖼 Media Library</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="mpSearch" placeholder="Search..." style="background:var(--bg);border:1px solid var(--border);color:var(--white);font-family:'Syne',sans-serif;font-size:12px;padding:6px 10px;border-radius:3px;outline:none;width:180px" oninput="mpFilter(this.value)">
        <button class="et-btn-gold" id="mpSelectBtn" onclick="mpConfirm()" style="padding:6px 14px;font-size:11px" disabled>✓ Use Image</button>
        <button onclick="etCloseModal('mediaPickerModal')" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;transition:all 0.15s">✕</button>
      </div>
    </div>
    <!-- Upload zone in modal -->
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(200,169,110,0.03);flex-shrink:0">
      <div style="border:1px dashed rgba(200,169,110,0.2);border-radius:4px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px" onclick="document.getElementById('mpFileInput').click()" onmouseover="this.style.borderColor='var(--gold-border)';this.style.background='var(--gold-dim)'" onmouseout="this.style.borderColor='rgba(200,169,110,0.2)';this.style.background='transparent'">
        <span style="font-size:16px">⬆</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white2);letter-spacing:0.06em">Upload new image</span>
      </div>
      <input type="file" id="mpFileInput" multiple accept="image/*" style="display:none" onchange="mpUpload(this.files)">
      <div id="mpUploadStatus" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--white3);text-align:center;margin-top:5px;display:none"></div>
    </div>
    <!-- Grid -->
    <div style="overflow-y:auto;flex:1;padding:12px">
      <div id="mpGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
        <div style="grid-column:1/-1;text-align:center;padding:40px"><div class="et-spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
